openapi: 3.1.0

info:
  title: DevOps Incident Platform API
  version: 0.0.1
  description: REST API for the DevOps incident management platform.
  license:
    name: MIT
    url: https://opensource.org/license/mit

tags:
  - name: health
    description: Service health and readiness.
  - name: incidents
    description: Incident lifecycle management (incident-service).
  - name: genai
    description: AI-assisted incident analysis (on-demand regeneration triggers).

servers:
  - url: http://localhost:4010
    description: Local mock server (pixi run mock-api)
  - url: /api/v1
    description: API gateway (relative, in-cluster)

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [health]
      security: []
      responses:
        "200":
          description: Gateway health status
          content:
            application/json:
              schema:
                type: object
                required: [status]
                additionalProperties: false
                properties:
                  status:
                    type: string
                    example: ok
        "503":
          description: Service unavailable
        "400":
          description: Bad request

  /genai/health:
    get:
      operationId: genaiHealth
      summary: GenAI service health check
      tags: [genai]
      security: []
      responses:
        "200":
          description: GenAI service and Ollama reachability status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenaiHealthResponse"
        "503":
          description: Ollama unreachable

  /incidents:
    get:
      operationId: listIncidents
      summary: List all incidents
      tags: [incidents]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IncidentStatus"
        - name: severity
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Severity"
      responses:
        "200":
          description: Incidents in reverse-chronological order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Incident"
    post:
      operationId: createIncident
      summary: Manually create a new incident
      tags: [incidents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncidentRequest"
      responses:
        "201":
          description: Incident created; starts in open state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "400":
          description: Validation failed

  /incidents/{incidentId}:
    get:
      operationId: getIncident
      summary: Get a single incident by ID
      tags: [incidents]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      responses:
        "200":
          description: Incident found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "404":
          $ref: "#/components/responses/IncidentNotFound"
    patch:
      operationId: updateIncident
      summary: Update incident status or severity
      tags: [incidents]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIncidentRequest"
      responses:
        "200":
          description: Updated incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
        "404":
          $ref: "#/components/responses/IncidentNotFound"

  /incidents/{incidentId}/events:
    get:
      operationId: listIncidentEvents
      summary: Get the event log for an incident
      tags: [incidents]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      responses:
        "200":
          description: Event log entries in chronological order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IncidentEvent"
        "404":
          $ref: "#/components/responses/IncidentNotFound"

  /incidents/{incidentId}/comments:
    get:
      operationId: listComments
      summary: List comments on an incident
      tags: [incidents]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      responses:
        "200":
          description: Comments in chronological order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        "404":
          $ref: "#/components/responses/IncidentNotFound"
    post:
      operationId: addComment
      summary: Add a comment to an incident
      tags: [incidents]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "404":
          $ref: "#/components/responses/IncidentNotFound"

  /incidents/{incidentId}/genai/summary:
    post:
      operationId: regenerateSummary
      summary: Trigger summary regeneration for an incident
      tags: [genai]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      responses:
        "202":
          $ref: "#/components/responses/RegenAccepted"
        "404":
          $ref: "#/components/responses/IncidentNotFound"

  /incidents/{incidentId}/genai/severity:
    post:
      operationId: regenerateSeverity
      summary: Trigger severity suggestion regeneration for an incident
      tags: [genai]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      responses:
        "202":
          $ref: "#/components/responses/RegenAccepted"
        "404":
          $ref: "#/components/responses/IncidentNotFound"

  /incidents/{incidentId}/genai/solutions:
    post:
      operationId: regenerateSolutions
      summary: Trigger solution suggestions regeneration for an incident
      tags: [genai]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      responses:
        "202":
          $ref: "#/components/responses/RegenAccepted"
        "404":
          $ref: "#/components/responses/IncidentNotFound"

  /incidents/{incidentId}/genai/postmortem:
    post:
      operationId: regeneratePostmortem
      summary: Trigger postmortem regeneration for a resolved incident
      tags: [genai]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      responses:
        "202":
          $ref: "#/components/responses/RegenAccepted"
        "404":
          $ref: "#/components/responses/IncidentNotFound"
        "409":
          $ref: "#/components/responses/IncidentNotResolved"

components:
  parameters:
    IncidentIdParam:
      name: incidentId
      in: path
      required: true
      description: UUID of the target incident.
      schema:
        type: string
        format: uuid
        example: 018e2c5f-1234-7abc-8def-000000000001

  responses:
    RegenAccepted:
      description: Regeneration task accepted for async processing
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RegenAccepted"
    IncidentNotFound:
      description: No incident exists with the given ID
    IncidentNotResolved:
      description: Postmortem operations require the incident to be in resolved state

  schemas:
    GenaiHealthResponse:
      type: object
      description: GenAI service health status including Ollama reachability.
      required: [status, ollamaReachable, model]
      additionalProperties: false
      properties:
        status:
          type: string
          example: ok
        ollamaReachable:
          type: boolean
          example: true
        model:
          type: string
          example: qwen2.5:3b

    RegenAccepted:
      type: object
      description: Confirmation that an AI generation task was accepted for async processing.
      required: [accepted, task]
      additionalProperties: false
      properties:
        accepted:
          type: boolean
          example: true
        task:
          type: string
          example: SUMMARY
          enum: [SUMMARY, SEVERITY_SUGGESTION, SOLUTION_SUGGESTIONS, POSTMORTEM]

    Severity:
      type: string
      enum: [SEV1, SEV2, SEV3, SEV4]
      description: Incident severity. SEV1 is highest impact.

    IncidentStatus:
      type: string
      enum: [open, investigating, resolved]

    Incident:
      type: object
      description: An incident as stored by incident-service.
      required: [id, title, status, severity, createdAt]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: Checkout 5xx spike
        description:
          type: [string, "null"]
        status:
          $ref: "#/components/schemas/IncidentStatus"
        severity:
          $ref: "#/components/schemas/Severity"
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: [string, "null"]
          format: date-time

    IncidentEvent:
      type: object
      description: One entry from an incident's append-only Event Log.
      required: [timestamp, type, description]
      additionalProperties: false
      properties:
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          example: status_changed
        description:
          type: string
          example: "status: open -> investigating"

    SummaryResponse:
      type: object
      description: >
        Latest AI-generated narrative summary for an incident (returned by GET
        in a later release; used now as the structured LLM output contract).
      required: [summary]
      additionalProperties: false
      example:
        summary: >-
          Checkout API latency spiked after deploy v2.4.1; error rate on
          payment-service rose to 12%.
      properties:
        summary:
          type: string
          example: >-
            Checkout API latency spiked after deploy v2.4.1; error rate on
            payment-service rose to 12%.

    SeverityResponse:
      type: object
      description: >
        Latest AI-generated severity recommendation with rationale (GET in a
        later release; structured LLM output contract today).
      required: [severity, reason]
      additionalProperties: false
      example:
        severity: SEV2
        reason: >-
          Customer-facing checkout degraded for more than 15 minutes with no
          workaround.
      properties:
        severity:
          $ref: "#/components/schemas/Severity"
        reason:
          type: string
          example: >-
            Customer-facing checkout degraded for more than 15 minutes with no
            workaround.

    SolutionsResponse:
      type: object
      description: >
        Latest AI-generated remediation suggestions (GET in a later release;
        structured LLM output contract today).
      required: [solutions]
      additionalProperties: false
      example:
        solutions:
          - Roll back payment-service to v2.3.9
          - Scale checkout-api replicas to 6
      properties:
        solutions:
          type: array
          items:
            type: string
          example:
            - Roll back payment-service to v2.3.9
            - Scale checkout-api replicas to 6

    CreateIncidentRequest:
      type: object
      description: Payload for manually creating a new incident.
      required: [title, severity]
      additionalProperties: false
      properties:
        title:
          type: string
          example: Checkout 5xx spike
        description:
          type: [string, "null"]
          example: High error rate on checkout API after deploy v2.4.1
        severity:
          $ref: "#/components/schemas/Severity"

    UpdateIncidentRequest:
      type: object
      description: Partial update for an incident's mutable fields.
      additionalProperties: false
      minProperties: 1
      properties:
        status:
          $ref: "#/components/schemas/IncidentStatus"
        severity:
          $ref: "#/components/schemas/Severity"

    Comment:
      type: object
      description: An immutable comment left on an incident.
      required: [id, incidentId, authorId, content, createdAt]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        incidentId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        content:
          type: string
          example: Possible root cause is the connection pool configuration in v2.4.1
        createdAt:
          type: string
          format: date-time

    CreateCommentRequest:
      type: object
      description: Payload for adding a comment to an incident.
      required: [content]
      additionalProperties: false
      properties:
        content:
          type: string
          minLength: 1
          example: Possible root cause is the connection pool configuration in v2.4.1

    PostmortemResponse:
      type: object
      description: >
        Latest AI-generated postmortem draft for a resolved incident (GET in a
        later release; structured LLM output contract today).
      required: [rootCause, timeline, actionItems]
      additionalProperties: false
      example:
        rootCause: Connection pool misconfiguration in payment-service v2.4.1
        timeline:
          - "14:02 Deploy v2.4.1 completed"
          - "14:18 Checkout error rate crossed 5%"
        actionItems:
          - Add pool-size validation to deploy checklist
          - Alert on checkout latency SLO burn
      properties:
        rootCause:
          type: string
          example: Connection pool misconfiguration in payment-service v2.4.1
        timeline:
          type: array
          items:
            type: string
          example:
            - "14:02 Deploy v2.4.1 completed"
            - "14:18 Checkout error rate crossed 5%"
        actionItems:
          type: array
          items:
            type: string
          example:
            - Add pool-size validation to deploy checklist
            - Alert on checkout latency SLO burn
