openapi: 3.1.0

info:
  title: DevOps Incident Platform API
  version: 0.0.1
  license:
    name: MIT
    identifier: MIT

servers:
  - url: /api/v1
    description: API gateway (relative)

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        "503":
          description: Service unavailable
        "400":
          description: Bad request
