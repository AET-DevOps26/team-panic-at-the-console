openapi: 3.1.0

info:
  title: DevOps Incident Platform API
  version: 0.0.1
  description: REST API for the DevOps incident management platform.
  license:
    name: MIT
    url: https://opensource.org/license/mit

tags:
  - name: health
    description: Service health and readiness.
  - name: genai
    description: AI-assisted incident analysis (on-demand regeneration triggers).
  - name: auth
    description: |
      Registration, login, and logout (user-service). On login, user-service sets an httpOnly `session`
      cookie (JWT, `SameSite=Strict`) per ADR 0007. User routes use `security: []` in the spec so generated
      Python clients accept `Client` + cookies instead of mandatory Bearer tokens (see ADR 0007).
  - name: users
    description: |
      User profiles and directory (user-service). Runtime auth uses the `session` cookie or gateway-injected
      `X-User-Id` / `X-User-Role`; OpenAPI marks operations `security: []` for codegen only.

servers:
  - url: http://localhost:4010
    description: Local mock server (pixi run mock-api)
  - url: http://localhost:8080/api/v1
    description: Local gateway and Swagger UI (pixi run compose-up, same paths as Helm)
  - url: /api/v1
    description: API gateway (relative, in-cluster)

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [health]
      security: []
      responses:
        "200":
          description: Gateway health status
          content:
            application/json:
              schema:
                type: object
                required: [status]
                additionalProperties: false
                properties:
                  status:
                    type: string
                    example: ok
        "503":
          description: Service unavailable
        "400":
          description: Bad request

  /genai/health:
    get:
      operationId: genaiHealth
      summary: GenAI service health check
      tags: [genai]
      security: []
      responses:
        "200":
          description: GenAI service and Ollama reachability status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenaiHealthResponse"
        "503":
          description: Ollama unreachable

  /incidents/{incidentId}/genai/summary:
    post:
      operationId: regenerateSummary
      summary: Trigger summary regeneration for an incident
      tags: [genai]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      responses:
        "202":
          $ref: "#/components/responses/RegenAccepted"
        "404":
          $ref: "#/components/responses/IncidentNotFound"

  /incidents/{incidentId}/genai/severity:
    post:
      operationId: regenerateSeverity
      summary: Trigger severity suggestion regeneration for an incident
      tags: [genai]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      responses:
        "202":
          $ref: "#/components/responses/RegenAccepted"
        "404":
          $ref: "#/components/responses/IncidentNotFound"

  /incidents/{incidentId}/genai/solutions:
    post:
      operationId: regenerateSolutions
      summary: Trigger solution suggestions regeneration for an incident
      tags: [genai]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      responses:
        "202":
          $ref: "#/components/responses/RegenAccepted"
        "404":
          $ref: "#/components/responses/IncidentNotFound"

  /incidents/{incidentId}/genai/postmortem:
    post:
      operationId: regeneratePostmortem
      summary: Trigger postmortem regeneration for a resolved incident
      tags: [genai]
      parameters:
        - $ref: "#/components/parameters/IncidentIdParam"
      responses:
        "202":
          $ref: "#/components/responses/RegenAccepted"
        "404":
          $ref: "#/components/responses/IncidentNotFound"
        "409":
          $ref: "#/components/responses/IncidentNotResolved"

  /auth/register:
    post:
      operationId: registerUser
      summary: Create a new user account
      description: |
        Public self-registration. New accounts receive the `MEMBER` role.
        Passwords are stored hashed server-side; the cleartext password is never returned.
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid request (validation failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      summary: Authenticate and start a session
      description: |
        On success, user-service sets an httpOnly `session` cookie containing a signed JWT
        (`SameSite=Strict`). The gateway validates this cookie and injects `X-User-Id` /
        `X-User-Role` on downstream requests. Do not send credentials on subsequent API calls.
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          headers:
            Set-Cookie:
              description: httpOnly session JWT (`session` cookie)
              schema:
                type: string
                example: session=eyJhbG...; Path=/; HttpOnly; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      summary: End the current session
      description: |
        Clears the `session` cookie via `Set-Cookie`. Always returns 204, even when no cookie
        was sent (idempotent logout).
      tags: [auth]
      security: []
      responses:
        "204":
          description: Logged out (or already logged out)
          headers:
            Set-Cookie:
              description: Clears the session cookie
              schema:
                type: string
                example: session=; Path=/; HttpOnly; SameSite=Strict; Max-Age=0

  /users/me:
    get:
      operationId: getCurrentUser
      summary: Get the authenticated user profile
      description: |
        Requires a valid `session` cookie (browser) or prior login via `POST /auth/login` on the same HTTP client.
        Python callers should use `Client` and pass cookies (e.g. `client.with_cookies({"session": "<jwt>"})`), not
        `AuthenticatedClient` / `Authorization: Bearer`.
      tags: [users]
      security: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      summary: List users (directory)
      description: |
        Returns all users for assignment pickers and mention lists. Requires a valid `session` cookie (see
        `GET /users/me`). Python callers use `Client` + cookies, not Bearer auth.
      tags: [users]
      security: []
      parameters:
        - $ref: "#/components/parameters/UserListLimitParam"
        - $ref: "#/components/parameters/UserListOffsetParam"
      responses:
        "200":
          description: User directory page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    UserListLimitParam:
      name: limit
      in: query
      required: false
      description: Maximum number of users to return (default 50, max 100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

    UserListOffsetParam:
      name: offset
      in: query
      required: false
      description: Number of users to skip for pagination.
      schema:
        type: integer
        minimum: 0
        default: 0

    IncidentIdParam:
      name: incidentId
      in: path
      required: true
      description: UUID of the target incident.
      schema:
        type: string
        format: uuid
        example: 018e2c5f-1234-7abc-8def-000000000001

  responses:
    RegenAccepted:
      description: Regeneration task accepted for async processing
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RegenAccepted"
    IncidentNotFound:
      description: No incident exists with the given ID
    IncidentNotResolved:
      description: Postmortem operations require the incident to be in resolved state

  schemas:
    UserRole:
      type: string
      description: |
        Platform role aligned with the analysis object model.
        `MEMBER` maps to TeamMember, `RESPONDER` to IncidentResponder, `COMMANDER` to IncidentCommander.
      enum: [MEMBER, RESPONDER, COMMANDER]
      example: MEMBER

    User:
      type: object
      description: Public user profile (no credentials).
      required: [id, email, displayName, role, createdAt]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          example: 018e2c5f-1234-7abc-8def-0000000000aa
        email:
          type: string
          format: email
          example: responder@example.com
        displayName:
          type: string
          minLength: 1
          maxLength: 100
          example: Alex Responder
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt:
          type: string
          format: date-time
          example: "2026-05-08T10:00:00Z"

    RegisterRequest:
      type: object
      required: [email, password, displayName]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          example: new.user@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          writeOnly: true
          example: "change-me-8+"
        displayName:
          type: string
          minLength: 1
          maxLength: 100
          example: New User

    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          example: responder@example.com
        password:
          type: string
          format: password
          writeOnly: true
          example: "change-me-8+"
          minLength: 8

    UserListResponse:
      type: object
      required: [items, total, limit, offset]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
          minimum: 0
          description: Total users matching the query (ignoring pagination).
          example: 2
        limit:
          type: integer
          minimum: 1
          maximum: 100
          example: 50
        offset:
          type: integer
          minimum: 0
          example: 0

    ErrorResponse:
      type: object
      description: Simple error payload for auth and validation failures.
      required: [message]
      additionalProperties: false
      properties:
        message:
          type: string
          example: Invalid email or password

    GenaiHealthResponse:
      type: object
      description: GenAI service health status including Ollama reachability.
      required: [status, ollamaReachable, model]
      additionalProperties: false
      properties:
        status:
          type: string
          example: ok
        ollamaReachable:
          type: boolean
          example: true
        model:
          type: string
          example: qwen2.5:3b

    RegenAccepted:
      type: object
      description: Confirmation that an AI generation task was accepted for async processing.
      required: [accepted, task]
      additionalProperties: false
      properties:
        accepted:
          type: boolean
          example: true
        task:
          type: string
          example: SUMMARY
          enum: [SUMMARY, SEVERITY_SUGGESTION, SOLUTION_SUGGESTIONS, POSTMORTEM]

    Severity:
      type: string
      enum: [SEV1, SEV2, SEV3, SEV4]
      description: Incident severity. SEV1 is highest impact.

    IncidentStatus:
      type: string
      enum: [open, investigating, resolved]

    Incident:
      type: object
      description: An incident as stored by incident-service.
      required: [id, title, status, severity, createdAt]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: Checkout 5xx spike
        description:
          type: [string, "null"]
        status:
          $ref: "#/components/schemas/IncidentStatus"
        severity:
          $ref: "#/components/schemas/Severity"
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: [string, "null"]
          format: date-time

    IncidentEvent:
      type: object
      description: One entry from an incident's append-only Event Log.
      required: [timestamp, type, description]
      additionalProperties: false
      properties:
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          example: status_changed
        description:
          type: string
          example: "status: open -> investigating"

    SummaryResponse:
      type: object
      description: >
        Latest AI-generated narrative summary for an incident (returned by GET
        in a later release; used now as the structured LLM output contract).
      required: [summary]
      additionalProperties: false
      example:
        summary: >-
          Checkout API latency spiked after deploy v2.4.1; error rate on
          payment-service rose to 12%.
      properties:
        summary:
          type: string
          example: >-
            Checkout API latency spiked after deploy v2.4.1; error rate on
            payment-service rose to 12%.

    SeverityResponse:
      type: object
      description: >
        Latest AI-generated severity recommendation with rationale (GET in a
        later release; structured LLM output contract today).
      required: [severity, reason]
      additionalProperties: false
      example:
        severity: SEV2
        reason: >-
          Customer-facing checkout degraded for more than 15 minutes with no
          workaround.
      properties:
        severity:
          $ref: "#/components/schemas/Severity"
        reason:
          type: string
          example: >-
            Customer-facing checkout degraded for more than 15 minutes with no
            workaround.

    SolutionsResponse:
      type: object
      description: >
        Latest AI-generated remediation suggestions (GET in a later release;
        structured LLM output contract today).
      required: [solutions]
      additionalProperties: false
      example:
        solutions:
          - Roll back payment-service to v2.3.9
          - Scale checkout-api replicas to 6
      properties:
        solutions:
          type: array
          items:
            type: string
          example:
            - Roll back payment-service to v2.3.9
            - Scale checkout-api replicas to 6

    PostmortemResponse:
      type: object
      description: >
        Latest AI-generated postmortem draft for a resolved incident (GET in a
        later release; structured LLM output contract today).
      required: [rootCause, timeline, actionItems]
      additionalProperties: false
      example:
        rootCause: Connection pool misconfiguration in payment-service v2.4.1
        timeline:
          - "14:02 Deploy v2.4.1 completed"
          - "14:18 Checkout error rate crossed 5%"
        actionItems:
          - Add pool-size validation to deploy checklist
          - Alert on checkout latency SLO burn
      properties:
        rootCause:
          type: string
          example: Connection pool misconfiguration in payment-service v2.4.1
        timeline:
          type: array
          items:
            type: string
          example:
            - "14:02 Deploy v2.4.1 completed"
            - "14:18 Checkout error rate crossed 5%"
        actionItems:
          type: array
          items:
            type: string
          example:
            - Add pool-size validation to deploy checklist
            - Alert on checkout latency SLO burn
