name: CI Copier

on:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5

      - name: Run linting
        run: pixi run lint
        env:
          CLICOLOR_FORCE: 1

      - name: Lint Helm charts
        run: |
          pixi run -e deploy deploy-tools-version
          pixi run -e deploy helm lint infra/helm/devops-platform
          pixi run -e deploy helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          pixi run -e deploy helm dependency build infra/helm/monitoring
          pixi run -e deploy helm lint infra/helm/monitoring

  lockfile:
    name: Lockfile consistency
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5

      - name: Verify lockfile is up to date
        run: pixi install --frozen
