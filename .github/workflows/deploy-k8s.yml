name: Deploy to Kubernetes Cluster

# Called by release.yml after images are built, or run manually via the Actions
# tab to (re)deploy an arbitrary tag. The image tag always comes from `inputs.tag`,
# so there is no resolve step and no GHCR polling: when invoked from a release the
# orchestrator's `needs: build` already guarantees the images exist.

on:
  workflow_call:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. latest, v1.2.3, sha-abc1234)"
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. latest, v1.2.3, sha-abc1234)"
        type: string
        default: latest
        required: true

concurrency:
  group: k8s-deployment
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    environment: production-kubernetes
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: deploy

      - name: Run helm-deploy task
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          DEPLOY_NAMESPACE: ${{ vars.DEPLOY_NAMESPACE }}
          TAG: ${{ inputs.tag }}
        run: pixi run -e deploy helm-deploy
