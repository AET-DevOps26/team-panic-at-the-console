name: Build Service Images (reusable)

on:
  workflow_call:
    inputs:
      push:
        description: Whether to push images to GHCR.
        type: boolean
        required: true
      primary_tag:
        description: Primary image tag (e.g. release version or branch name).
        type: string
        required: true
      sha_tag:
        description: Secondary image tag (e.g. "latest" on release, or "sha-<sha>" on CI builds).
        type: string
        required: true

jobs:
  build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - gateway
          - incident-service
          - event-service
          - rule-engine
          - user-service
          - notification-service
          - webhook-service
          - genai-service
        include:
          - service: frontend
            build_context: ./services
            build_dockerfile: ./services/frontend/Dockerfile
          - service: gateway
            build_context: ./services
            build_dockerfile: ./services/gateway/Dockerfile
          - service: incident-service
            build_context: ./services
            build_dockerfile: ./services/incident-service/Dockerfile
          - service: event-service
            build_context: ./services
            build_dockerfile: ./services/event-service/Dockerfile
          - service: user-service
            build_context: ./services
            build_dockerfile: ./services/user-service/Dockerfile
          - service: genai-service
            build_context: ./services
            build_dockerfile: ./services/genai-service/Dockerfile

    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Normalize image repository
        id: repo
        run: echo "lower=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push) image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.build_context || format('./services/{0}', matrix.service) }}
          file: ${{ matrix.build_dockerfile || format('./services/{0}/Dockerfile', matrix.service) }}
          push: ${{ inputs.push }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.lower }}/${{ matrix.service }}:${{ inputs.primary_tag }}
            ghcr.io/${{ steps.repo.outputs.lower }}/${{ matrix.service }}:${{ inputs.sha_tag }}
