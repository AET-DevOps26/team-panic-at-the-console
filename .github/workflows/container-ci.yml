name: Container CI

on:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-container-layout:
    name: Validate container build layout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Ensure service Dockerfiles exist
        run: |
          set -euo pipefail
          missing=0
          for service in frontend gateway incident-service event-service rule-engine user-service notification-service webhook-service genai-service; do
            dockerfile="services/${service}/Dockerfile"
            if [ ! -f "$dockerfile" ]; then
              echo "::error title=Missing Dockerfile::Expected ${dockerfile}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "One or more required Dockerfiles are missing."
            exit 1
          fi

  build-service-images:
    name: Build service images
    needs: validate-container-layout
    uses: ./.github/workflows/_build-images.yml
    permissions:
      contents: read
      packages: read
    with:
      push: false
      primary_tag: dev
      sha_tag: sha-${{ github.sha }}
