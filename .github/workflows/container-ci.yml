name: Container CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  validate-container-layout:
    name: Validate container build layout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure service Dockerfiles exist
        run: |
          set -euo pipefail
          missing=0
          for service in gateway user-service content-service genai-service; do
            dockerfile="services/${service}/Dockerfile"
            if [ ! -f "$dockerfile" ]; then
              echo "::error title=Missing Dockerfile::Expected ${dockerfile}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "One or more required Dockerfiles are missing."
            exit 1
          fi

  build-service-images:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    needs: validate-container-layout
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - user-service
          - content-service
          - genai-service

    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push) image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:main
