name: Deploy to Azure VM

# Called by release.yml after images are built (action=full, so Terraform applies
# any infra changes and Ansible redeploys), or run manually via the Actions tab.
# The tag and action always come from `inputs`, so there is no resolve step and no
# GHCR polling: when invoked from a release the orchestrator's `needs: build`
# already guarantees the images exist. A single `gate` job carries
# `environment: production`, so the whole deploy needs one approval.

on:
  workflow_call:
    inputs:
      tag:
        description: "Docker image tag to deploy (e.g. latest, v1.2.3, sha-abc1234)"
        type: string
        required: true
      action:
        description: "deploy=Ansible only | provision=Terraform only | full=Terraform+Ansible | plan=dry-run"
        type: string
        default: deploy
        required: false
  workflow_dispatch:
    inputs:
      action:
        description: "deploy=Ansible only | provision=Terraform only | full=Terraform+Ansible | plan=dry-run"
        type: choice
        options:
          - deploy
          - provision
          - full
          - plan
        default: deploy
        required: true
      tag:
        description: "Docker image tag to deploy (e.g. latest, v1.2.3, sha-abc1234)"
        type: string
        default: latest
        required: true

concurrency:
  group: azure-vm-deployment
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # Required for OIDC authentication with Azure

# ── Required GitHub Secrets ────────────────────────────────────────────────────
# AZURE_CLIENT_ID       — App Registration client ID (for OIDC, no secret rotation needed)
# AZURE_TENANT_ID       — Azure Active Directory tenant ID
# AZURE_SUBSCRIPTION_ID — Azure subscription ID
# VM_SSH_PUBLIC_KEY     — Public key placed on the VM by Terraform
# VM_SSH_PRIVATE_KEY    — Matching private key used by Ansible to connect
# POSTGRES_PASSWORD     — Strong password for the shared Postgres instance
# (no GHCR_TOKEN needed — images at ghcr.io/aet-devops26/team-panic-at-the-console are public)
#
# ── Required GitHub Variables ──────────────────────────────────────────────────
# TF_BACKEND_STORAGE_ACCOUNT — Storage account name printed by bootstrap-state.sh
#
# ── Azure OIDC setup (one-time, ~5 minutes) ────────────────────────────────────
# 1. Create an App Registration:
#      az ad app create --display-name "github-actions-team-panic"
# 2. Create a Service Principal:
#      az ad sp create --id <appId>
# 3. Add Federated Credential on the App Registration (in Azure Portal or CLI):
#      Entity type: GitHub Actions
#      Organisation: aet-devops26 | Repository: team-panic-at-the-console | Environment: production
# 4. Assign the Contributor role (subscription or resource group scope):
#      az role assignment create \
#        --assignee <appId> \
#        --role Contributor \
#        --scope /subscriptions/<subscriptionId>
# 5. Store values as GitHub Secrets:
#      AZURE_CLIENT_ID     = <appId>
#      AZURE_TENANT_ID     = <tenantId>
#      AZURE_SUBSCRIPTION_ID = <subscriptionId>

env:
  TF_DIR: infra/terraform
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  # ── Approval gate ─────────────────────────────────────────────────────────────
  # Single environment-protected job so the whole deploy needs exactly one approval,
  # whether triggered by a release or run manually.
  gate:
    name: Await approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Approved"

  # ── Terraform ───────────────────────────────────────────────────────────────
  terraform:
    name: Terraform
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      vm_ip: ${{ steps.vm_ip.outputs.ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}"
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Plan
        if: inputs.action == 'provision' || inputs.action == 'full' || inputs.action == 'plan'
        run: terraform plan -out=tfplan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

      - name: Terraform Apply
        if: inputs.action == 'provision' || inputs.action == 'full'
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_DIR }}

      - name: Get VM public IP from state
        id: vm_ip
        if: inputs.action != 'plan'
        run: |
          ip=$(terraform output -raw vm_public_ip 2>/dev/null || true)
          if [ -z "${ip}" ]; then
            echo "::error::No VM IP in Terraform state. Run the 'provision' or 'full' action first."
            exit 1
          fi
          echo "ip=${ip}" >> "$GITHUB_OUTPUT"
        working-directory: ${{ env.TF_DIR }}

  # ── Ansible ─────────────────────────────────────────────────────────────────
  ansible:
    name: Ansible Deploy
    needs: [gate, terraform]
    if: needs.terraform.result == 'success' && (inputs.action == 'deploy' || inputs.action == 'full')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Ansible
        run: pip install --quiet ansible

      - name: Configure SSH key
        env:
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          install -m 0700 -d "${HOME}/.ssh"
          printf '%s\n' "${VM_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/vm_key"
          chmod 600 "${HOME}/.ssh/vm_key"
          ssh-keygen -lf "${HOME}/.ssh/vm_key" >/dev/null || {
            echo "::error::VM_SSH_PRIVATE_KEY secret is not a valid private key"
            exit 1
          }

      - name: Write inventory
        run: |
          cat > /tmp/inventory.ini <<EOF
          [vm]
          ${{ needs.terraform.outputs.vm_ip }} ansible_user=azureuser ansible_ssh_private_key_file=${HOME}/.ssh/vm_key ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new -o ConnectTimeout=30'
          EOF

      - name: Wait for SSH to become available
        run: |
          vm_ip="${{ needs.terraform.outputs.vm_ip }}"
          ssh_key="${HOME}/.ssh/vm_key"
          max_attempts=60
          ssh_opts=(
            -o StrictHostKeyChecking=no
            -o ConnectTimeout=10
            -i "${ssh_key}"
          )

          echo "Waiting for SSH on ${vm_ip}..."
          ready=false
          for i in $(seq 1 "${max_attempts}"); do
            if ssh "${ssh_opts[@]}" "azureuser@${vm_ip}" true 2>/dev/null; then
              echo "SSH ready after ${i} attempt(s)"
              ready=true
              break
            fi

            if [ $((i % 10)) -eq 0 ] || [ "${i}" -eq "${max_attempts}" ]; then
              echo "  attempt ${i}/${max_attempts} — diagnostics:"
              if nc -z -w 5 "${vm_ip}" 22 2>/dev/null; then
                echo "    port 22 is open"
              else
                echo "    port 22 is closed or filtered"
              fi
              ssh "${ssh_opts[@]}" "azureuser@${vm_ip}" true 2>&1 | tail -5 || true
            else
              echo "  attempt ${i}/${max_attempts}, retrying in 10s..."
            fi
            sleep 10
          done

          if [ "${ready}" != true ]; then
            echo "::error::SSH not available on ${vm_ip} after ${max_attempts} attempts (~10 min)"
            exit 1
          fi

      - name: Write Ansible variables
        run: |
          python3 - <<'EOF'
          import os, yaml
          v = {
            "image_tag":         os.environ["IMAGE_TAG"],
            "postgres_password": os.environ["POSTGRES_PASSWORD"],
          }
          with open("/tmp/ansible-vars.yml", "w") as f:
            yaml.dump(v, f)
          EOF
        env:
          IMAGE_TAG: ${{ inputs.tag }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Run Ansible playbook
        run: |
          ansible-playbook \
            -i /tmp/inventory.ini \
            infra/ansible/playbook.yml \
            --extra-vars "@/tmp/ansible-vars.yml"
