name: Deploy Helm (SOPS)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. v0.1.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: deploy

      - name: Resolve deployment tag
        id: tag
        run: echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.KUBECONFIG_B64 }}" ]; then
            echo "::error title=Missing secret::Set KUBECONFIG_B64 repo/environment secret first."
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"

      - name: Decrypt production values
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.SOPS_AGE_KEY }}" ]; then
            echo "::error title=Missing secret::Set SOPS_AGE_KEY repo/environment secret first."
            exit 1
          fi
          mkdir -p "$HOME/.config/sops/age"
          printf '%s' "${{ secrets.SOPS_AGE_KEY }}" > "$HOME/.config/sops/age/keys.txt"
          if [ ! -f infra/helm/secrets/values.prod.enc.yaml ]; then
            echo "::error title=Missing encrypted values::Expected infra/helm/secrets/values.prod.enc.yaml for production deploy."
            exit 1
          fi
          pixi run -e deploy sops --decrypt infra/helm/secrets/values.prod.enc.yaml > infra/helm/secrets/values.prod.dec.yaml

      - name: Deploy app chart
        run: |
          set -euo pipefail
          pixi run -e deploy helm upgrade --install devops-platform infra/helm/devops-platform \
            --namespace production \
            --create-namespace \
            --set global.image.tag="${{ steps.tag.outputs.value }}" \
            --values infra/helm/secrets/values.prod.dec.yaml \
            --wait --timeout 5m
