name: OpenAPI Lint

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - .github/workflows/openapi-lint.yml
  pull_request:
    paths:
      - api/**
      - .github/workflows/openapi-lint.yml
  merge_group:

jobs:
  lint-openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6

      - name: Lint OpenAPI spec
        run: pixi run openapi-lint

  codegen-validate:
    name: Validate codegen (TypeScript + Python + Java)
    runs-on: ubuntu-latest
    needs: lint-openapi

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate OpenAPI code generation via Pixi task
        run: pixi run openapi-codegen-validate
