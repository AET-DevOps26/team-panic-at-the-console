name: OpenAPI Lint

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - .github/workflows/openapi-lint.yml
  pull_request:
    paths:
      - api/**
      - .github/workflows/openapi-lint.yml
  merge_group:

jobs:
  lint-openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6

      - name: Lint OpenAPI spec
        run: pixi run openapi-lint

  codegen-validate:
    name: Validate codegen (TypeScript + Python + Java)
    runs-on: ubuntu-latest
    needs: lint-openapi

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate OpenAPI code generation via Pixi task
        run: pixi run openapi-codegen-validate
