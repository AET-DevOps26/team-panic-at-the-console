# Pixi + pixi-build for genai-service (not covered by root `lefthook` lint alone).
name: python-tests

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "services/genai-service/**"
  pull_request:
    paths:
      - "services/genai-service/**"
  merge_group:

jobs:
  test:
    name: genai-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          manifest-path: services/genai-service/pixi.toml
          frozen: true
          cache: true

      - name: Type check
        run: pixi run --manifest-path services/genai-service/pixi.toml typecheck

      - name: Run tests
        run: pixi run --manifest-path services/genai-service/pixi.toml test
