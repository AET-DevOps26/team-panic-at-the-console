name: Compose Validate

on:
  pull_request:
    paths:
      - "infra/compose/**"
      - "services/**"
      - "api/openapi.yaml"
      - ".env.example"
      - "pixi.toml"
      - ".github/workflows/compose-validate.yml"
  merge_group:
  push:
    branches:
      - main
    paths:
      - "infra/compose/**"
      - "services/**"
      - "api/openapi.yaml"
      - ".env.example"
      - "pixi.toml"
      - ".github/workflows/compose-validate.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compose-config:
    name: Validate Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5

      - name: Validate compose files via Pixi task
        run: pixi run compose-validate

  compose-smoke:
    name: Smoke-boot full stack
    runs-on: ubuntu-latest
    # Frontend and swagger-ui are excluded - static assets, no runtime wiring to test.
    # Ollama pulls a multi-GB model on first boot; we cache the volume across runs.
    env:
      SMOKE_SERVICES: "postgres nats ollama ollama-init gateway incident-service event-service rule-engine user-service notification-service webhook-service genai-service"
      COMPOSE_PROJECT: "smoke"
      COMPOSE_FILE: "infra/compose/docker-compose.yml"
      COMPOSE_ENV_FILE: ".env.example"
      OLLAMA_VOLUME: "smoke_ollama_data"
      OLLAMA_MODEL: "qwen2.5:3b"
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Restore Ollama model cache
        id: ollama-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: /tmp/ollama-cache
          key: ollama-models-${{ env.OLLAMA_MODEL }}-v1

      - name: Seed Ollama volume from cache
        if: steps.ollama-cache.outputs.cache-hit == 'true'
        run: |
          set -euo pipefail
          docker volume create "${OLLAMA_VOLUME}"
          docker run --rm \
            -v "${OLLAMA_VOLUME}":/dest \
            -v /tmp/ollama-cache:/src:ro \
            alpine sh -c "cp -a /src/. /dest/"

      - name: Boot stack
        id: boot
        run: |
          set -euo pipefail
          docker compose \
            -p "${COMPOSE_PROJECT}" \
            --project-directory . \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f "${COMPOSE_FILE}" \
            up -d --build ${SMOKE_SERVICES}

      - name: Wait for ollama-init to complete model pull
        id: ollama-init
        run: |
          set -euo pipefail
          # ollama-init exits 0 once the model is pulled; --wait can't represent
          # that, so we use docker wait directly.
          exit_code=$(docker wait "${COMPOSE_PROJECT}-ollama-init-1")
          echo "ollama-init exited with code ${exit_code}"
          test "${exit_code}" = "0"

      - name: Wait for long-running services to be healthy
        id: wait
        run: |
          set -euo pipefail
          # Long-running services only; ollama-init is excluded since it already
          # completed in the previous step.
          docker compose \
            -p "${COMPOSE_PROJECT}" \
            --project-directory . \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f "${COMPOSE_FILE}" \
            wait --timeout 600 \
            postgres nats ollama gateway incident-service event-service \
            rule-engine user-service notification-service webhook-service \
            genai-service || true
          # `docker compose wait` exits when a container *stops*, not when it
          # becomes healthy. So we follow up with an explicit health-state check.
          echo "::group::container status"
          docker compose -p "${COMPOSE_PROJECT}" --project-directory . -f "${COMPOSE_FILE}" ps
          echo "::endgroup::"
          unhealthy=0
          for svc in postgres nats ollama gateway incident-service event-service \
                     rule-engine user-service notification-service webhook-service \
                     genai-service; do
            cid="${COMPOSE_PROJECT}-${svc}-1"
            state=$(docker inspect -f '{{.State.Status}}' "${cid}" 2>/dev/null || echo "missing")
            health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "${cid}" 2>/dev/null || echo "missing")
            echo "  ${svc}: state=${state} health=${health}"
            if [ "${state}" != "running" ]; then
              echo "::error title=Service not running::${svc} state=${state}"
              unhealthy=1
            elif [ "${health}" != "healthy" ] && [ "${health}" != "none" ]; then
              echo "::error title=Service unhealthy::${svc} health=${health}"
              unhealthy=1
            fi
          done
          exit "${unhealthy}"

      - name: Save Ollama model cache
        if: success() && steps.ollama-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/ollama-cache
          docker run --rm \
            -v "${OLLAMA_VOLUME}":/src:ro \
            -v /tmp/ollama-cache:/dest \
            alpine sh -c "cp -a /src/. /dest/"

      - name: Dump container status and logs on failure
        if: failure() && (steps.boot.outcome == 'failure' || steps.ollama-init.outcome == 'failure' || steps.wait.outcome == 'failure')
        run: |
          echo "::group::docker compose ps"
          docker compose -p "${COMPOSE_PROJECT}" --project-directory . -f "${COMPOSE_FILE}" ps
          echo "::endgroup::"
          for svc in ${SMOKE_SERVICES}; do
            echo "::group::logs - ${svc}"
            docker compose -p "${COMPOSE_PROJECT}" --project-directory . -f "${COMPOSE_FILE}" logs --tail=200 "${svc}" || true
            echo "::endgroup::"
          done

      - name: Tear down stack
        if: always()
        run: |
          docker compose \
            -p "${COMPOSE_PROJECT}" \
            --project-directory . \
            -f "${COMPOSE_FILE}" \
            down --remove-orphans --volumes
