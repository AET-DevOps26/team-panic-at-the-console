name: Compose Validate

on:
  pull_request:
    paths:
      - "infra/compose/**"
      - "infra/helm/devops-platform/files/**"
      - "services/**"
      - "api/openapi.yaml"
      - ".env.example"
      - "pixi.toml"
      - ".github/workflows/compose-validate.yml"
  merge_group:
  push:
    branches:
      - main
    paths:
      - "infra/compose/**"
      - "infra/helm/devops-platform/files/**"
      - "services/**"
      - "api/openapi.yaml"
      - ".env.example"
      - "pixi.toml"
      - ".github/workflows/compose-validate.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compose-config:
    name: Validate Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6

      - name: Validate compose files via Pixi task
        run: pixi run compose-validate

      - name: Verify the canonical command resolves (root discovery, no flags)
        # What a user actually types: `docker compose` from root, no flags.
        run: docker compose config -q

  compose-smoke:
    name: Smoke-boot full stack
    runs-on: ubuntu-latest
    # Gate the expensive boot/build on config validation passing first.
    needs: compose-config
    # Boot via the canonical flag-free `docker compose`, so CI runs what users run.
    # Ollama pulls a multi-GB model on first boot; we cache the volume across runs.
    env:
      SMOKE_SERVICES: "postgres postgres-init nats ollama ollama-init gateway incident-service event-service user-service notification-service webhook-service genai-service edge swagger-ui prometheus grafana"
      # frontend is WIP (served on :3000, not via edge). The coverage guard below
      # fails if any service is in neither list, so none can escape unnoticed.
      EXCLUDED_SERVICES: "frontend"
      COMPOSE_PROJECT: "smoke"
      OLLAMA_VOLUME: "smoke_ollama_data"
      OLLAMA_MODEL: "qwen2.5:3b"
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Ensure every compose service is smoke-tested or explicitly excluded
        run: |
          set -euo pipefail
          read -ra smoke <<< "${SMOKE_SERVICES}"
          read -ra excluded <<< "${EXCLUDED_SERVICES}"
          all=$(docker compose config --services | sort -u)
          covered=$(printf '%s\n' "${smoke[@]}" "${excluded[@]}" | sort -u)
          missing=$(comm -23 <(printf '%s\n' "${all}") <(printf '%s\n' "${covered}") || true)
          if [ -n "${missing}" ]; then
            echo "::error::Compose services neither smoke-tested nor excluded:"
            echo "${missing}"
            echo "Add each to SMOKE_SERVICES or EXCLUDED_SERVICES in compose-validate.yml."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Restore Ollama model cache
        id: ollama-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/ollama-cache
          key: ollama-models-${{ env.OLLAMA_MODEL }}-v1

      - name: Seed Ollama volume from cache
        if: steps.ollama-cache.outputs.cache-hit == 'true'
        run: |
          set -euo pipefail
          docker volume create "${OLLAMA_VOLUME}"
          docker run --rm \
            -v "${OLLAMA_VOLUME}":/dest \
            -v /tmp/ollama-cache:/src:ro \
            alpine sh -c "cp -a /src/. /dest/"

      - name: Boot stack
        id: boot
        run: |
          set -euo pipefail
          read -ra services <<< "${SMOKE_SERVICES}"
          docker compose -p "${COMPOSE_PROJECT}" up -d --build "${services[@]}"

      - name: Wait for one-shot init services to complete
        id: one-shots
        run: |
          set -euo pipefail
          # postgres-init and ollama-init are one-shot; docker wait their exit
          # codes (-a: the container may already be gone).
          for svc in postgres-init ollama-init; do
            cid=$(docker compose -p "${COMPOSE_PROJECT}" ps -aq "${svc}")
            if [ -z "${cid}" ]; then
              echo "::error::${svc} container not found"
              exit 1
            fi
            exit_code=$(docker wait "${cid}")
            echo "${svc} (${cid}) exited with code ${exit_code}"
            test "${exit_code}" = "0"
          done

      - name: Wait for long-running services to be healthy
        id: wait
        run: |
          set -euo pipefail
          # postgres-init and ollama-init excluded (already exited 0; --wait
          # would call that a failure).
          docker compose \
            -p "${COMPOSE_PROJECT}" \
            up -d --no-recreate --wait --wait-timeout 600 \
            postgres nats ollama gateway incident-service event-service \
            user-service notification-service webhook-service \
            genai-service edge swagger-ui prometheus grafana

      - name: Probe edge proxy over HTTP
        id: probe
        # "up" != "serving": would have caught the edge mounting an empty
        # nginx.conf/ dir over its config (ran fine, routed nothing).
        run: |
          set -euo pipefail
          probe() {
            path="$1"; want="$2"
            for ((i = 0; i < 15; i++)); do
              code=$(curl -sS -o /dev/null -w '%{http_code}' -L "http://localhost:8080${path}" 2>/dev/null || true)
              if [ "${code}" = "${want}" ]; then
                echo "GET :8080${path} -> ${code}"
                return 0
              fi
              sleep 2
            done
            echo "::error::GET :8080${path} -> ${code:-no response} (expected ${want})"
            return 1
          }
          probe /api/v1/health 200
          probe /swagger 200
          # Asserts the /webhooks -> webhook-service route is wired: GET on the
          # POST-only ingest endpoint is a 405 from the service itself (the
          # frontend catch-all would answer 200 instead).
          probe /webhooks/github 405
          # Asserts the / -> frontend route is wired.
          probe / 200

      - name: Probe observability endpoints
        id: probe-observability
        run: |
          set -euo pipefail
          probe() {
            url="$1"; want="$2"
            for ((i = 0; i < 15; i++)); do
              code=$(curl -sS -o /dev/null -w '%{http_code}' "${url}" 2>/dev/null || true)
              if [ "${code}" = "${want}" ]; then
                echo "GET ${url} -> ${code}"
                return 0
              fi
              sleep 2
            done
            echo "::error::GET ${url} -> ${code:-no response} (expected ${want})"
            return 1
          }
          # Direct ports (local dev); Prometheus serves under its route-prefix.
          probe http://localhost:9090/prometheus/-/ready 200
          probe http://localhost:3030/api/health 200
          # Via the edge proxy, like the Helm ingress (and the Azure VM, where
          # only :8080 is open).
          probe http://localhost:8080/prometheus/-/ready 200
          probe http://localhost:8080/grafana/api/health 200

      - name: Save Ollama model cache
        if: success() && steps.ollama-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/ollama-cache
          # chmod a+rX inside the container so the host runner can read the
          # files when actions/cache tars them up. Ollama's id_ed25519 lands
          # 0600/root which otherwise blocks the cache save.
          docker run --rm \
            -v "${OLLAMA_VOLUME}":/src:ro \
            -v /tmp/ollama-cache:/dest \
            alpine sh -c "cp -a /src/. /dest/ && chmod -R a+rX /dest/"

      - name: Dump container status and logs on failure
        if: failure() && (steps.boot.outcome == 'failure' || steps.one-shots.outcome == 'failure' || steps.wait.outcome == 'failure' || steps.probe.outcome == 'failure' || steps.probe-observability.outcome == 'failure')
        run: |
          set -euo pipefail
          read -ra services <<< "${SMOKE_SERVICES}"
          echo "::group::docker compose ps"
          docker compose -p "${COMPOSE_PROJECT}" ps
          echo "::endgroup::"
          for svc in "${services[@]}"; do
            echo "::group::logs - ${svc}"
            docker compose -p "${COMPOSE_PROJECT}" logs --tail=200 "${svc}" || true
            echo "::endgroup::"
          done

      - name: Tear down stack
        if: always()
        run: |
          docker compose -p "${COMPOSE_PROJECT}" down --remove-orphans --volumes
