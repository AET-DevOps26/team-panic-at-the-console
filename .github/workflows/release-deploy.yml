name: Release Deploy

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-images:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - gateway
          - incident-service
          - event-service
          - rule-engine
          - user-service
          - notification-service
          - webhook-service
          - genai-service
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Normalize image repository
        id: repo
        run: echo "lower=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${GITHUB_EVENT_RELEASE_TAG_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.lower }}/${{ matrix.service }}:${{ steps.tag.outputs.value }}
            ghcr.io/${{ steps.repo.outputs.lower }}/${{ matrix.service }}:sha-${{ github.sha }}

  deploy:
    name: Deploy tagged release
    runs-on: ubuntu-latest
    needs: build-and-push-images
    environment: production
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${GITHUB_EVENT_RELEASE_TAG_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Install Helm, kubectl, and sops
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          curl -fsSL https://dl.k8s.io/release/v1.30.2/bin/linux/amd64/kubectl -o kubectl
          sudo install -m 0755 kubectl /usr/local/bin/kubectl
          curl -fsSL https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64 -o sops
          sudo install -m 0755 sops /usr/local/bin/sops

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.KUBECONFIG_B64 }}" ]; then
            echo "::error title=Missing secret::Set KUBECONFIG_B64 repo/environment secret first."
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"

      - name: Decrypt production values
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.SOPS_AGE_KEY }}" ]; then
            echo "::error title=Missing secret::Set SOPS_AGE_KEY repo/environment secret first."
            exit 1
          fi
          mkdir -p "$HOME/.config/sops/age"
          printf '%s' "${{ secrets.SOPS_AGE_KEY }}" > "$HOME/.config/sops/age/keys.txt"
          sops --decrypt infra/helm/secrets/values.prod.enc.yaml > infra/helm/secrets/values.prod.dec.yaml

      - name: Resolve target namespace
        id: ns
        run: |
          set -euo pipefail
          ns="${{ vars.DEPLOY_NAMESPACE }}"
          if [ -z "$ns" ]; then
            echo "::error title=Missing variable::Set DEPLOY_NAMESPACE repo/environment variable first."
            exit 1
          fi
          echo "value=$ns" >> "$GITHUB_OUTPUT"

      - name: Deploy chart
        run: |
          set -euo pipefail
          helm upgrade --install devops-platform infra/helm/devops-platform \
            --namespace "${{ steps.ns.outputs.value }}" \
            --create-namespace \
            --set global.image.tag="${{ steps.tag.outputs.value }}" \
            --values infra/helm/secrets/values.prod.dec.yaml
