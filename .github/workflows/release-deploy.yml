name: Release Deploy

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  resolve-tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve release tag
        id: tag
        run: echo "value=${GITHUB_EVENT_RELEASE_TAG_NAME}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}

  build-and-push-images:
    name: Build and push images
    needs: resolve-tag
    uses: ./.github/workflows/_build-images.yml
    permissions:
      contents: read
      packages: write
    with:
      push: true
      primary_tag: ${{ needs.resolve-tag.outputs.tag }}
      sha_tag: sha-${{ github.sha }}

  deploy:
    name: Deploy tagged release
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-and-push-images]
    environment: production
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: deploy

      - name: Run helm-deploy task
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          DEPLOY_NAMESPACE: ${{ vars.DEPLOY_NAMESPACE }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: pixi run -e deploy helm-deploy
