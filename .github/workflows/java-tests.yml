name: java-tests

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "services/incident-service/**"
      - "services/user-service/**"
      - "services/generated/java/**"
      - "api/openapi.yaml"
  pull_request:
    paths:
      - "services/incident-service/**"
      - "services/user-service/**"
      - "services/generated/java/**"
      - "api/openapi.yaml"
  merge_group:

jobs:
  test:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [incident-service, user-service]

    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          manifest-path: services/${{ matrix.service }}/pixi.toml
          frozen: true
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-jdk25-${{ matrix.service }}-${{ hashFiles(format('services/{0}/pom.xml', matrix.service)) }}
          restore-keys: |
            maven-${{ runner.os }}-jdk25-${{ matrix.service }}-
            maven-${{ runner.os }}-jdk25-
            maven-${{ runner.os }}-

      - name: Build and test
        run: pixi run --manifest-path services/${{ matrix.service }}/pixi.toml test
