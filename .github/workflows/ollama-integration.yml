# Hits a real Ollama. Manual + nightly only (not gating PRs).
name: ollama-integration

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1" # every Monday at midnight

env:
  OLLAMA_VERSION: v0.31.2
  OLLAMA_INTEGRATION_MODEL: qwen2.5:0.5b

jobs:
  integration:
    name: genai-service end-to-end against real Ollama
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          manifest-path: services/genai-service/pixi.toml
          frozen: true
          cache: true

      - name: Cache Ollama model
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.OLLAMA_VERSION }}-${{ env.OLLAMA_INTEGRATION_MODEL }}-v2

      - name: Install Ollama
        run: |
          curl -fsSL \
            "https://github.com/ollama/ollama/releases/download/${OLLAMA_VERSION}/ollama-linux-amd64.tar.zst" \
            -o /tmp/ollama-linux-amd64.tar.zst
          zstd -d /tmp/ollama-linux-amd64.tar.zst -c | sudo tar -xf - -C /usr/local
          /usr/local/bin/ollama --version

      - name: Start Ollama
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is up"
              exit 0
            fi
            sleep 1
          done
          echo "Ollama failed to start within 30s"
          cat /tmp/ollama.log
          exit 1

      - name: Pull model
        run: ollama pull "$OLLAMA_INTEGRATION_MODEL"

      - name: Smoke test Ollama generation
        run: |
          curl -sf http://localhost:11434/api/generate \
            -H 'Content-Type: application/json' \
            -d "$(printf '{"model":"%s","prompt":"Reply with ok.","stream":false}' "$OLLAMA_INTEGRATION_MODEL")" \
            > /tmp/ollama-generate.json || {
              cat /tmp/ollama.log
              exit 1
            }
          jq -e '.response | strings | length > 0' /tmp/ollama-generate.json > /dev/null || {
            printf 'Unexpected Ollama smoke response:\n'
            sed -n '1,120p' /tmp/ollama-generate.json
            cat /tmp/ollama.log
            exit 1
          }

      - name: Run integration tests
        env:
          OLLAMA_INTEGRATION_URL: http://localhost:11434
        run: pixi run --manifest-path services/genai-service/pixi.toml test-integration
