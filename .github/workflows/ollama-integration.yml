# Hits a real Ollama. Manual + nightly only (not gating PRs).
name: ollama-integration

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1" # every Monday at midnight

env:
  OLLAMA_INTEGRATION_MODEL: qwen2.5:0.5b

jobs:
  integration:
    name: genai-service end-to-end against real Ollama
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          manifest-path: services/genai-service/pixi.toml
          frozen: true
          cache: true

      - name: Cache Ollama model
        uses: actions/cache@v5.0.5
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ env.OLLAMA_INTEGRATION_MODEL }}

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is up"
              exit 0
            fi
            sleep 1
          done
          echo "Ollama failed to start within 30s"
          cat /tmp/ollama.log
          exit 1

      - name: Pull model
        run: ollama pull "$OLLAMA_INTEGRATION_MODEL"

      - name: Run integration tests
        env:
          OLLAMA_INTEGRATION_URL: http://localhost:11434
        run: pixi run --manifest-path services/genai-service/pixi.toml test-integration
