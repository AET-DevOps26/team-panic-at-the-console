name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'destroy' to confirm. This will delete the VM and all managed infrastructure."
        type: string
        required: true

concurrency:
  group: azure-vm-deployment
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_DIR: infra/terraform
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  gate:
    name: Confirm
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::Confirmation input must be exactly 'destroy'"
            exit 1
          fi

  destroy:
    name: Terraform Destroy
    needs: gate
    runs-on: ubuntu-latest
    environment: azure
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}"
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}
