version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: "/client"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: maven
    directory: "/services/content-service"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: maven
    directory: "/services/gateway"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: maven
    directory: "/services/user-service"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directory: "/services/genai-service"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
