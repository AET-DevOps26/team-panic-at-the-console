groups:
  - name: spring-services
    rules:
      - alert: SpringServiceDown
        expr: up{job=~"incident-service|event-service|user-service|gateway|webhook-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Prometheus cannot scrape {{ $labels.job }} /actuator/prometheus for 1 minute."

      - alert: HighServerErrorRate
        expr: |
          sum by (job) (
            rate(http_server_requests_seconds_count{
              job=~"incident-service|event-service|user-service|gateway|webhook-service",
              outcome="SERVER_ERROR"
            }[5m])
          )
          /
          sum by (job) (
            rate(http_server_requests_seconds_count{
              job=~"incident-service|event-service|user-service|gateway|webhook-service"
            }[5m])
          ) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx rate on {{ $labels.job }}"
          description: "{{ $labels.job }} server error rate exceeds 1% over 5 minutes."

      - alert: HighClientErrorRate
        expr: |
          sum by (job) (
            rate(http_server_requests_seconds_count{
              job=~"incident-service|event-service|user-service|gateway|webhook-service",
              outcome="CLIENT_ERROR"
            }[5m])
          )
          /
          sum by (job) (
            rate(http_server_requests_seconds_count{
              job=~"incident-service|event-service|user-service|gateway|webhook-service"
            }[5m])
          ) > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 4xx rate on {{ $labels.job }}"
          description: "{{ $labels.job }} client error rate exceeds 10% over 5 minutes."

      - alert: SlowP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, job) (
              rate(http_server_requests_seconds_bucket{
                job=~"incident-service|event-service|user-service|gateway|webhook-service"
              }[5m])
            )
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow p95 latency on {{ $labels.job }}"
          description: "{{ $labels.job }} p95 response time exceeds 2s over 5 minutes."

  - name: genai-service
    rules:
      - alert: GenAIServiceDown
        expr: up{job="genai-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "genai-service is down"
          description: "Prometheus cannot scrape genai-service /metrics for 1 minute."

      - alert: GenAINatsConsumerDisconnected
        expr: nats_consumer_connected == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "genai-service NATS consumer disconnected"
          description: "nats_consumer_connected has been 0 for 2 minutes."

      - alert: SlowAIGeneration
        expr: |
          histogram_quantile(
            0.95,
            sum by (type, provider, le) (
              rate(ai_generation_seconds_bucket[5m])
            )
          ) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow AI generation for {{ $labels.type }} ({{ $labels.provider }})"
          description: "p95 ai_generation_seconds exceeds 60s over the last 5 minutes."

      - alert: LLMFallbackSpike
        expr: increase(llm_fallback_total[5m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Logos to Ollama fallback spike"
          description: "More than 3 LLM fallbacks in 5 minutes."
