# Shared timing for Spring Boot liveness probes (wget in eclipse-temurin JRE image).
x-healthcheck-spring: &healthcheck-spring
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 40s

services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/helm/devops-platform/files/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devops} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Re-runs init-dbs.sh on every `up`: postgres only executes
  # /docker-entrypoint-initdb.d on a fresh volume, so this one-shot is what
  # creates databases added to the script after the volume was initialized.
  postgres-init:
    image: postgres:16-alpine
    entrypoint: ["/bin/bash", "/init-dbs.sh"]
    environment:
      PGHOST: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:-devops}
      POSTGRES_USER: ${POSTGRES_USER:-devops}
      POSTGRES_DB: postgres
    volumes:
      - ./infra/helm/devops-platform/files/init-dbs.sh:/init-dbs.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--http_port", "8222"]
    ports:
      - "4222:4222" # client
      - "8222:8222" # monitoring / metrics
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.9.0
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q '${OLLAMA_MODEL:-qwen2.5:3b}'"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:0.9.0
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull ${OLLAMA_MODEL:-qwen2.5:3b}"]
    depends_on:
      ollama:
        condition: service_started
    restart: on-failure

  # ── Application Services ──────────────────────────────────────────────────

  # Routes :8080 like cluster ingress (/ -> frontend, /api -> gateway,
  # /swagger, /grafana, /prometheus). See nginx.conf. Upstreams are resolved
  # per request via Docker DNS, so a missing or recreated upstream means a 502
  # until it is up, never a stale nginx. depends_on is start-order polish only.
  edge:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./infra/compose/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      gateway:
        condition: service_healthy
      swagger-ui:
        condition: service_started
      # nginx resolves proxy_pass hostnames at startup; webhook-service must exist.
      webhook-service:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: frontend/Dockerfile
      args:
        # CI builds pass the real commit; local source builds show "dev".
        VITE_COMMIT_SHA: ${GIT_SHA:-dev}
    environment:
      # Sidebar footer links. ":port/path" resolves against the host the
      # browser used to reach the frontend, so it works for localhost and a
      # VM alike. Routed through edge :8080 like the Helm ingress; the VM
      # firewall only opens 8080, not the direct observability ports.
      GRAFANA_URL: ${GRAFANA_URL:-:8080/grafana}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-:8080/prometheus}
    ports:
      - "3000:3000"
    restart: unless-stopped

  gateway:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/gateway:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: gateway/Dockerfile
    environment:
      GATEWAY_INCIDENT_SERVICE_URL: http://incident-service:8081
      GATEWAY_EVENT_SERVICE_URL: http://event-service:8082
      GATEWAY_USER_SERVICE_URL: http://user-service:8084
      GATEWAY_NOTIFICATION_SERVICE_URL: http://notification-service:8085
      GATEWAY_WEBHOOK_SERVICE_URL: http://webhook-service:8086
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      # Session JWT secret shared with user-service (ADR 0007).
      AUTH_JWT_SECRET: ${JWT_SECRET:-local-dev-only-jwt-secret-0123456789abcdef}
    healthcheck:
      <<: *healthcheck-spring
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/api/v1/health || exit 1"]
    depends_on:
      incident-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    restart: unless-stopped

  incident-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/incident-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: incident-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incidents
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devops}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    ports:
      - "8081:8081"
    healthcheck:
      <<: *healthcheck-spring
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/health || exit 1"]
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: unless-stopped

  event-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/event-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: event-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/events
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devops}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    ports:
      - "8082:8082"
    healthcheck:
      <<: *healthcheck-spring
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8082/health || exit 1"]
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: unless-stopped

  rule-engine:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/rule-engine:${IMAGE_TAG:-latest}
    build:
      context: ./services/rule-engine
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rules
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devops}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    ports:
      - "8083:8083"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: unless-stopped

  user-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/user-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: user-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devops}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      # Session JWT secret shared with the gateway (ADR 0007).
      AUTH_JWT_SECRET: ${JWT_SECRET:-local-dev-only-jwt-secret-0123456789abcdef}
      # Registration invitation code; empty keeps self-registration open.
      AUTH_INVITE_CODE: ${INVITE_CODE:-}
    ports:
      - "8084:8084"
    healthcheck:
      <<: *healthcheck-spring
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8084/health || exit 1"]
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    restart: unless-stopped

  notification-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/notification-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: notification-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notifications
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devops}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    ports:
      - "8085:8085"
    healthcheck:
      <<: *healthcheck-spring
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8085/health || exit 1"]
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: unless-stopped

  webhook-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/webhook-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: webhook-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/webhooks
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devops}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      # Optional per-source HMAC secrets: WEBHOOK_SECRETS_<SOURCE>=<secret>.
      WEBHOOK_REQUIRE_SIGNATURE: ${WEBHOOK_REQUIRE_SIGNATURE:-false}
    ports:
      - "8086:8086"
    healthcheck:
      <<: *healthcheck-spring
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8086/health || exit 1"]
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: unless-stopped

  genai-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/genai-service:${IMAGE_TAG:-latest}
    build:
      context: ./services
      dockerfile: ./genai-service/Dockerfile
    environment:
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      # Default to ollama locally: Logos is only reachable from the TUM network (eduVPN).
      # Set LLM_PROVIDER=logos (on eduVPN) to use the chair-hosted model instead.
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-false}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      LOGOS_URL: ${LOGOS_URL:-https://logos.aet.cit.tum.de:8080}
      LOGOS_MODEL: ${LOGOS_MODEL:-openai/gpt-oss-120b}
      LOGOS_API_KEY: ${LOGOS_API_KEY:-}
      INCIDENT_SERVICE_URL: http://incident-service:8081
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD-SHELL", 'python -c "import urllib.request as u; r=u.urlopen(''http://127.0.0.1:8087/health'', timeout=2); exit(0 if r.getcode()==200 else 1)"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      nats:
        condition: service_started
      ollama:
        condition: service_healthy
      incident-service:
        condition: service_healthy
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.32.6
    volumes:
      - ./api/openapi.yaml:/openapi.yaml:ro
    environment:
      SWAGGER_JSON: /openapi.yaml
      BASE_URL: /swagger
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      # Serve under /prometheus (route-prefix comes from this URL's path),
      # mirroring the Helm ingress. Reachable via edge at :8080/prometheus;
      # direct access moves to :9090/prometheus.
      - --web.external-url=http://localhost:9090/prometheus
    volumes:
      - ./infra/compose/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/compose/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/prometheus/-/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Serve under /grafana like the Helm deployment (edge routes
      # :8080/grafana). serve_from_sub_path also keeps direct :3030 working.
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3030:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  prometheus_data:
  grafana_data:
