services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devops} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--http_port", "8222"]
    ports:
      - "4222:4222" # client
      - "8222:8222" # monitoring / metrics
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.9.0
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q '${OLLAMA_MODEL:-qwen2.5}'"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:0.9.0
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    entrypoint: ["/bin/sh", "-c", "until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull ${OLLAMA_MODEL:-qwen2.5:3b}"]
    depends_on:
      ollama:
        condition: service_started
    restart: on-failure

  # ── Application Services ──────────────────────────────────────────────────

  frontend:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/frontend:${IMAGE_TAG:-main}
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped

  gateway:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/gateway:${IMAGE_TAG:-main}
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    environment:
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_started
    restart: unless-stopped

  incident-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/incident-service:${IMAGE_TAG:-main}
    build:
      context: ./services
      dockerfile: incident-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incidents
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devops}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  event-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/event-service:${IMAGE_TAG:-main}
    build:
      context: ./services/event-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/events
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devops}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  rule-engine:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/rule-engine:${IMAGE_TAG:-main}
    build:
      context: ./services/rule-engine
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rules
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devops}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  user-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/user-service:${IMAGE_TAG:-main}
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devops}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devops}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/notification-service:${IMAGE_TAG:-main}
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notifications
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devops}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  webhook-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/webhook-service:${IMAGE_TAG:-main}
    build:
      context: ./services/webhook-service
      dockerfile: Dockerfile
    environment:
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    ports:
      - "8086:8086"
    depends_on:
      nats:
        condition: service_started
    restart: unless-stopped

  genai-service:
    image: ghcr.io/aet-devops26/team-panic-at-the-console/genai-service:${IMAGE_TAG:-main}
    build:
      context: ./services
      dockerfile: ./genai-service/Dockerfile
    environment:
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      GENAI_OLLAMA_URL: http://ollama:11434
      GENAI_OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      INCIDENT_SERVICE_URL: http://incident-service:8081
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD-SHELL", 'python -c "import urllib.request as u; r=u.urlopen(''http://127.0.0.1:8087/health'', timeout=2); exit(0 if r.getcode()==200 else 1)"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      nats:
        condition: service_started
      ollama:
        condition: service_healthy
      incident-service:
        condition: service_started
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.32.6
    ports:
      - "8090:8080"
    volumes:
      - ./api/openapi.yaml:/openapi.yaml:ro
    environment:
      SWAGGER_JSON: /openapi.yaml
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
