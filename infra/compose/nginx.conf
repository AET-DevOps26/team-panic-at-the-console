worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  # Grafana Live streams over WebSocket; forward upgrade requests as such.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Local edge routing aligned with Helm ingress:
  # / -> frontend, /api -> gateway, /swagger, /webhooks, /grafana, /prometheus
  server {
    listen 8080;

    # Docker's embedded DNS. proxy_pass through a variable re-resolves per
    # request instead of caching the container IP at startup, so upstreams
    # recreated by a redeploy (new IPs) keep working without an nginx restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /swagger {
      set $upstream_swagger http://swagger-ui:8080;
      proxy_pass $upstream_swagger;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      set $upstream_gateway http://gateway:8080;
      proxy_pass $upstream_gateway;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Machine-facing webhook ingest (HMAC-authenticated), mirroring the Helm
    # ingress /webhooks path. Only the ingest route is exposed; the service's
    # read API stays internal.
    location /webhooks {
      set $upstream_webhooks http://webhook-service:8086;
      proxy_pass $upstream_webhooks;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana serves under /grafana (GF_SERVER_SERVE_FROM_SUB_PATH), matching
    # the Helm ingress path.
    location /grafana {
      set $upstream_grafana http://grafana:3000;
      proxy_pass $upstream_grafana;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # Prometheus serves under /prometheus (--web.external-url route prefix),
    # matching the Helm ingress path.
    location /prometheus {
      set $upstream_prometheus http://prometheus:9090;
      proxy_pass $upstream_prometheus;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Machine-facing webhook ingest (HMAC-authenticated), mirroring the Helm
    # ingress /webhooks path. Only the ingest route is exposed; the service's
    # read API stays internal.
    location /webhooks {
      proxy_pass http://webhook-service:8086;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Catch-all to the frontend (ingress serves it at /).
    location / {
      set $upstream_frontend http://frontend:3000;
      proxy_pass $upstream_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
