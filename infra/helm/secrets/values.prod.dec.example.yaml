# Copy this file to values.prod.dec.yaml and replace placeholders.
# Encrypt it to values.prod.enc.yaml using:
# sops --encrypt --in-place infra/helm/secrets/values.prod.dec.yaml

global:
  image:
    tag: v0.1.0

secrets:
  postgresPassword: "replace-me"
  # TUM Logos API key (lg-...). Leave empty to run genai-service on Ollama only.
  logosApiKey: "replace-me"
  # Grafana admin password. Dev default is "admin"; set a secure value here for production.
  grafanaPassword: "replace-me"
