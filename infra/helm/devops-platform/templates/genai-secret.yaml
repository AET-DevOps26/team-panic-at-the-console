{{- if (index .Values.services "genai-service").enabled }}
# Always rendered so genai-service's LOGOS_API_KEY secretKeyRef resolves even when the
# key is empty (dev): an empty key makes Logos calls fail and falls back to Ollama.
apiVersion: v1
kind: Secret
metadata:
  name: genai-credentials
  labels:
    app.kubernetes.io/name: genai-service
type: Opaque
stringData:
  logosApiKey: {{ .Values.secrets.logosApiKey | default "" | quote }}
{{- end }}
