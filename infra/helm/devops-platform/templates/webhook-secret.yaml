# Per-source HMAC secrets for the public /webhooks ingest endpoint.
# Referenced by the WEBHOOK_SECRETS_GITHUB env special case in deployment.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-platform.webhookSecretName" . }}
  labels:
    app.kubernetes.io/name: webhook-service
type: Opaque
stringData:
  # Blank means the github source has no secret configured; combined with
  # WEBHOOK_REQUIRE_SIGNATURE=true the service then rejects all webhooks.
  githubSecret: {{ .Values.secrets.webhookGithubSecret | quote }}
