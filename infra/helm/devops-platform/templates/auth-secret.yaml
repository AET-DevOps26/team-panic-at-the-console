# Session JWT signing secret shared by gateway (validation) and user-service
# (issuing) per ADR 0007. Referenced by the AUTH_JWT_SECRET env special case in
# deployment.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-platform.authSecretName" . }}
  labels:
    app.kubernetes.io/name: user-service
type: Opaque
stringData:
  jwtSecret: {{ include "devops-platform.jwtSecret" . | quote }}
  # Blank keeps self-registration open; set secrets.inviteCode for public instances.
  inviteCode: {{ .Values.secrets.inviteCode | default .Values.auth.inviteCode | quote }}
