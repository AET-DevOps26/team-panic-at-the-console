{{- if and .Values.monitoring.enabled .Values.monitoring.operatorCrds.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: genai-service
  labels:
    app.kubernetes.io/name: genai-service
    release: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: genai-service
  podMetricsEndpoints:
    - portNumber: {{ (index .Values.services "genai-service").port }}
      path: /metrics
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: spring-services
  labels:
    release: {{ .Release.Name }}
spec:
  selector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - incident-service
          - event-service
          - user-service
  podMetricsEndpoints:
    - path: /actuator/prometheus
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: gateway
    release: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  podMetricsEndpoints:
    - portName: metrics
      path: /actuator/prometheus
      interval: 15s
{{- end }}
