apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-platform
  labels:
    app.kubernetes.io/name: devops-platform
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - secretName: {{ .Values.ingress.secretName }}
      hosts:
        - {{ .Values.ingress.host }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{- if .Values.monitoring.enabled }}
          - path: {{ .Values.ingress.paths.grafana }}
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          {{- if not .Values.monitoring.operatorCrds.enabled }}
          - path: {{ .Values.ingress.paths.prometheus }}
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
          {{- end }}
          {{- end }}
          - path: {{ .Values.ingress.paths.frontend }}
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ .Values.services.frontend.port }}
          - path: {{ .Values.ingress.paths.api }}
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: {{ .Values.services.gateway.port }}
          {{- if (index .Values.services "webhook-service").enabled }}
          # Machine-facing ingest only; the service's read API stays internal.
          - path: {{ .Values.ingress.paths.webhooks }}
            pathType: Prefix
            backend:
              service:
                name: webhook-service
                port:
                  number: {{ (index .Values.services "webhook-service").port }}
          {{- end }}
          {{ $swaggerUi := index .Values.services "swagger-ui" }}
          {{ if and $swaggerUi $swaggerUi.enabled }}
          - path: {{ .Values.ingress.paths.swagger }}
            pathType: Prefix
            backend:
              service:
                name: swagger-ui
                port:
                  number: {{ $swaggerUi.port }}
          {{ end }}
