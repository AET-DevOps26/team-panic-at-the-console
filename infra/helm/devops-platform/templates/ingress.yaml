{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-platform
  labels:
    app.kubernetes.io/name: devops-platform
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if and .Values.ingress.tls .Values.ingress.host }}
  tls:
    - secretName: {{ required "ingress.secretName is required when ingress.tls is enabled" .Values.ingress.secretName }}
      hosts:
        - {{ .Values.ingress.host }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host }}
      {{- end }}
      http:
        paths:
          - path: {{ .Values.ingress.paths.frontend | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          - path: {{ .Values.ingress.paths.api | default "/api" }}
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
{{- end }}
