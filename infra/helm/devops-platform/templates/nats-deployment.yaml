apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels:
    app.kubernetes.io/name: nats
spec:
  replicas: 1
  {{- include "devops-platform.rolloutStrategy" (dict "recreate" true) | nindent 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          imagePullPolicy: IfNotPresent
          args:
            - "--jetstream"
            - "--store_dir"
            - /data/jetstream
            - "--http_port"
            - {{ .Values.nats.monitoringPort | quote }}
          ports:
            - containerPort: {{ .Values.nats.port }}
            - containerPort: {{ .Values.nats.monitoringPort }}
          {{- if .Values.nats.persistence }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.nats.monitoringPort }}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
      {{- if .Values.nats.persistence }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nats-data
      {{- end }}
