apiVersion: v1
kind: Service
metadata:
  name: nats
  labels:
    app.kubernetes.io/name: nats
spec:
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      protocol: TCP
      port: {{ .Values.nats.port }}
      targetPort: {{ .Values.nats.port }}
    - name: monitoring
      protocol: TCP
      port: {{ .Values.nats.monitoringPort }}
      targetPort: {{ .Values.nats.monitoringPort }}
