{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          {{- if $svc.image.override }}
          image: "{{ $svc.image.override }}"
          {{- else }}
          image: "{{ $.Values.global.image.registry }}/{{ $svc.image.repository }}:{{ $.Values.global.image.tag }}"
          {{- end }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ $svc.port }}
          {{- $globalEnv := list }}
          {{- if $svc.inheritGlobalEnv }}
          {{- $globalEnv = $.Values.global.env | default list }}
          {{- end }}
          {{- $serviceEnv := $svc.env | default list }}
          {{- $serviceEnvNames := dict }}
          {{- range $serviceEnv }}
          {{- $_ := set $serviceEnvNames .name true }}
          {{- end }}
          {{- $mergedEnv := list }}
          {{- range $globalEnv }}
          {{- if not (hasKey $serviceEnvNames .name) }}
          {{- $mergedEnv = append $mergedEnv . }}
          {{- end }}
          {{- end }}
          {{- $mergedEnv = concat $mergedEnv $serviceEnv }}
          {{- if $mergedEnv }}
          env:
            {{- range $mergedEnv }}
            {{- if eq .name "SPRING_DATASOURCE_PASSWORD" }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-platform.postgresSecretName" $ }}
                  key: password
            {{- else }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- if $svc.command }}
          command: {{ $svc.command | toJson }}
          {{- end }}
          {{- if $svc.args }}
          args: {{ $svc.args | toJson }}
          {{- end }}
          {{- if $svc.lifecycle }}
          lifecycle:
            {{- toYaml $svc.lifecycle | nindent 12 }}
          {{- end }}
          {{- with $svc.persistence }}
          volumeMounts:
            - name: data
              mountPath: {{ required "persistence.mountPath is required" .mountPath }}
          {{- end }}
      {{- with $svc.persistence }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $name }}-data
      {{- end }}
---
{{- end }}
{{- end }}
