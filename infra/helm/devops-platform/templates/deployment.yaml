{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
spec:
  replicas: 1
  {{- with $svc.progressDeadlineSeconds }}
  progressDeadlineSeconds: {{ . }}
  {{- end }}
  {{- if $svc.strategy }}
  strategy:
    {{- toYaml $svc.strategy | nindent 4 }}
  {{- else if $svc.persistence }}
  # RWO volumes cannot mount on two pods during a rolling update.
  # rollingUpdate: null clears the field when switching from RollingUpdate (Helm merge).
  strategy:
    type: Recreate
    rollingUpdate: null
  {{- else }}
  # Terminate the old pod before creating the new one. The default surge (+1 pod)
  # would need spare limits headroom the project ResourceQuota does not have, so a
  # rolling update would deadlock. Trade-off: a brief per-service gap on each deploy.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
      {{- with $svc.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if and $svc.modelInit $svc.persistence }}
      initContainers:
        - name: pull-model
          image: {{ required "image.override is required for modelInit" $svc.image.override | quote }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve &
              pid=$!
              until ollama list >/dev/null 2>&1; do sleep 2; done
              ollama pull "${OLLAMA_MODEL:-{{ $.Values.global.ollamaModel | default "qwen2.5:3b" }}}"
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
          env:
            - name: OLLAMA_MODEL
              value: {{ $.Values.global.ollamaModel | default "qwen2.5:3b" | quote }}
          {{- with (default $.Values.global.defaultResources $svc.resources) }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ required "persistence.mountPath is required" $svc.persistence.mountPath }}
      {{- end }}
      containers:
        - name: {{ $name }}
          {{- if $svc.image.override }}
          image: "{{ $svc.image.override }}"
          imagePullPolicy: {{ $svc.image.pullPolicy | default "IfNotPresent" }}
          {{- else }}
          image: "{{ $.Values.global.image.registry }}/{{ $svc.image.repository }}:{{ $.Values.global.image.tag }}"
          imagePullPolicy: {{ $svc.image.pullPolicy | default $.Values.global.image.pullPolicy | default "IfNotPresent" }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
            {{- with $svc.metricsPort }}
            - name: metrics
              containerPort: {{ . }}
            {{- end }}
          {{- if $svc.probes }}
          {{- include "devops-platform.httpProbes" (dict "healthPath" $svc.healthPath "port" $svc.port "initialDelaySeconds" ($svc.probeInitialDelaySeconds | default 30) "readinessInitialDelaySeconds" ($svc.probeReadinessInitialDelaySeconds | default 10)) | nindent 10 }}
          {{- else if $svc.ollamaProbes }}
          {{- include "devops-platform.ollamaProbes" (dict "port" $svc.port "model" ($.Values.global.ollamaModel | default "qwen2.5:3b")) | nindent 10 }}
          {{- end }}
          {{- with (default $.Values.global.defaultResources $svc.resources) }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $globalEnv := list }}
          {{- if $svc.inheritGlobalEnv }}
          {{- $globalEnv = $.Values.global.env | default list }}
          {{- end }}
          {{- $serviceEnv := $svc.env | default list }}
          {{- $serviceEnvNames := dict }}
          {{- range $serviceEnv }}
          {{- $_ := set $serviceEnvNames .name true }}
          {{- end }}
          {{- $mergedEnv := list }}
          {{- range $globalEnv }}
          {{- if not (hasKey $serviceEnvNames .name) }}
          {{- $mergedEnv = append $mergedEnv . }}
          {{- end }}
          {{- end }}
          {{- $mergedEnv = concat $mergedEnv $serviceEnv }}
          {{- if $mergedEnv }}
          env:
            {{- range $mergedEnv }}
            {{- if eq .name "SPRING_DATASOURCE_PASSWORD" }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-platform.postgresSecretName" $ }}
                  key: password
            {{- else if eq .name "AUTH_JWT_SECRET" }}
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-platform.authSecretName" $ }}
                  key: jwtSecret
            {{- else if eq .name "AUTH_INVITE_CODE" }}
            - name: AUTH_INVITE_CODE
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-platform.authSecretName" $ }}
                  key: inviteCode
            {{- else }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- if $svc.command }}
          command: {{ $svc.command | toJson }}
          {{- end }}
          {{- if $svc.args }}
          args: {{ $svc.args | toJson }}
          {{- end }}
          {{- if $svc.lifecycle }}
          lifecycle:
            {{- toYaml $svc.lifecycle | nindent 12 }}
          {{- end }}
          {{- if or $svc.persistence $svc.openapiConfigMap }}
          volumeMounts:
            {{- with $svc.persistence }}
            - name: data
              mountPath: {{ required "persistence.mountPath is required" .mountPath }}
            {{- end }}
            {{- if $svc.openapiConfigMap }}
            - name: openapi-spec
              mountPath: /openapi.yaml
              subPath: openapi.yaml
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or $svc.persistence $svc.openapiConfigMap }}
      volumes:
        {{- with $svc.persistence }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ $name }}-data
        {{- end }}
        {{- if $svc.openapiConfigMap }}
        - name: openapi-spec
          configMap:
            name: openapi-spec
        {{- end }}
      {{- end }}
---
{{- end }}
{{- end }}
