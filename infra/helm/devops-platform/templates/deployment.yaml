{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          {{- if $svc.image.override }}
          image: "{{ $svc.image.override }}"
          {{- else }}
          image: "{{ $.Values.global.image.registry }}/{{ $svc.image.repository }}:{{ $.Values.global.image.tag }}"
          {{- end }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ $svc.port }}
          {{- if $svc.env }}
          env:
            {{- range $key, $val := $svc.env }}
            - name: {{ $key }}
              value: {{ tpl $val $ | quote }}
            {{- end }}
          {{- end }}
          {{- if $svc.command }}
          command: {{ $svc.command | toJson }}
          {{- end }}
          {{- if $svc.args }}
          args: {{ $svc.args | toJson }}
          {{- end }}
          {{- if $svc.lifecycle }}
          lifecycle:
            {{- toYaml $svc.lifecycle | nindent 12 }}
          {{- end }}
          {{- if $svc.persistence }}
          volumeMounts:
            - name: data
              mountPath: {{ $svc.persistence.mountPath }}
          {{- end }}
      {{- if $svc.persistence }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $name }}-data
      {{- end }}
---
{{- end }}
{{- end }}
