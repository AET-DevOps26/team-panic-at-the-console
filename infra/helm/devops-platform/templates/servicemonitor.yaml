{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    release: {{ $.Release.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{{- end }}
{{- end }}
{{- end }}
