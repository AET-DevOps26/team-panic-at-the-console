global:
  image:
    registry: ghcr.io/aet-devops26/team-panic-at-the-console
    tag: main
  namespace: default
  ollamaModel: &ollamaModel qwen2.5:3b
  env:
    - name: NATS_URL
      value: nats://nats:4222

# Override postgresPassword in SOPS values for non-dev deploys.
secrets:
  postgresPassword: ""

nats:
  image: nats:2.10-alpine
  port: 4222
  monitoringPort: 8222
  persistence:
    size: 1Gi
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

postgres:
  image: postgres:16-alpine
  port: 5432
  user: devops
  password: devops
  database: postgres
  persistence:
    size: 5Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

ingress:
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: team-panic-at-the-console-devops26.stud.k8s.aet.cit.tum.de
  secretName: devops-platform-tls
  paths:
    frontend: /
    api: /api

services:
  frontend:
    enabled: true
    port: 3000
    image:
      repository: frontend

  gateway:
    enabled: true
    inheritGlobalEnv: true
    port: 8080
    image:
      repository: gateway

  incident-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8081
    image:
      repository: incident-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/incidents"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  event-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8082
    image:
      repository: event-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/events"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  rule-engine:
    enabled: true
    inheritGlobalEnv: true
    port: 8083
    image:
      repository: rule-engine
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/rules"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  user-service:
    enabled: true
    port: 8084
    image:
      repository: user-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/users"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  notification-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8085
    image:
      repository: notification-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/notifications"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  webhook-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8086
    image:
      repository: webhook-service

  genai-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8087
    image:
      repository: genai-service
    env:
      - name: OLLAMA_URL
        value: http://ollama:11434
      - name: OLLAMA_MODEL
        value: *ollamaModel
      - name: INCIDENT_SERVICE_URL
        value: http://incident-service:8081

  ollama:
    enabled: true
    port: 11434
    image:
      override: "ollama/ollama:0.9.0"
    command: ["ollama", "serve"]
    env:
      - name: OLLAMA_MODEL
        value: *ollamaModel
    lifecycle:
      postStart:
        exec:
          command:
            - "/bin/sh"
            - "-c"
            - "until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull ${OLLAMA_MODEL:-qwen2.5:3b}"
    persistence:
      size: 10Gi
      mountPath: /root/.ollama
