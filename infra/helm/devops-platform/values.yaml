global:
  image:
    registry: ghcr.io/aet-devops26/team-panic-at-the-console
    tag: latest
  namespace: default
  # Shared Ollama model tag: genai-service, init pull, and readiness probe.
  ollamaModel: &ollamaModel qwen2.5:3b
  env:
    - name: NATS_URL
      value: nats://nats:4222

# Override these in SOPS values for non-dev deploys.
secrets:
  postgresPassword: ""
  # TUM Logos API key (lg-...). Empty => genai-service falls back to Ollama.
  logosApiKey: ""

nats:
  image: nats:2.10-alpine
  port: 4222
  monitoringPort: 8222
  persistence:
    size: 1Gi
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

postgres:
  image: postgres:16-alpine
  port: 5432
  user: devops
  password: devops
  database: postgres
  persistence:
    size: 5Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

ingress:
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: team-panic-at-the-console-devops26.stud.k8s.aet.cit.tum.de
  secretName: devops-platform-tls
  paths:
    frontend: /
    api: /api
    swagger: /swagger

# Observability uses the shared cluster prometheus-operator (see templates/monitoring-*.yaml).
# We only ship namespaced CRs (PodMonitor, PrometheusRule) and a Grafana dashboard
# ConfigMap; the cluster operator scrapes them and the shared Grafana renders them.
# We do not self-host kube-prometheus-stack: the deploy user is namespace-scoped and
# cannot create the cluster-scoped resources (ClusterRoles, CRDs) it requires.
monitoring:
  enabled: true

services:
  frontend:
    enabled: true
    port: 3000
    image:
      repository: frontend
    # Sidebar footer links to the monitoring stack. Unset values hide the links.
    # Set to the shared cluster Prometheus/Grafana URLs for this deploy, e.g.:
    # env:
    #   - name: GRAFANA_URL
    #     value: https://<shared-grafana-host>
    #   - name: PROMETHEUS_URL
    #     value: https://<shared-prometheus-host>

  gateway:
    enabled: true
    inheritGlobalEnv: true
    port: 8080
    probes: true
    healthPath: /api/v1/health
    image:
      repository: gateway
    env:
      - name: GATEWAY_INCIDENT_SERVICE_URL
        value: "http://incident-service:8081"
      - name: GATEWAY_USER_SERVICE_URL
        value: "http://user-service:8084"
      - name: GATEWAY_NOTIFICATION_SERVICE_URL
        value: "http://notification-service:8085"

  incident-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8081
    probes: true
    healthPath: /health
    image:
      repository: incident-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/incidents"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  event-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8082
    image:
      repository: event-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/events"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  rule-engine:
    enabled: true
    inheritGlobalEnv: true
    port: 8083
    image:
      repository: rule-engine
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/rules"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  user-service:
    enabled: true
    port: 8084
    probes: true
    healthPath: /health
    image:
      repository: user-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/users"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  notification-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8085
    image:
      repository: notification-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/notifications"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  webhook-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8086
    image:
      repository: webhook-service

  genai-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8087
    probes: true
    healthPath: /health
    probeInitialDelaySeconds: 15
    probeReadinessInitialDelaySeconds: 5
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "8087"
    image:
      repository: genai-service
    env:
      # Cluster is on the TUM network, so Logos is reachable; Ollama stays as fallback.
      - name: LLM_PROVIDER
        value: logos
      - name: LLM_FALLBACK_ENABLED
        value: "true"
      - name: OLLAMA_URL
        value: http://ollama:11434
      - name: OLLAMA_MODEL
        value: *ollamaModel
      - name: LOGOS_URL
        value: https://logos.aet.cit.tum.de:8080
      - name: LOGOS_MODEL
        value: openai/gpt-oss-120b
      - name: LOGOS_API_KEY
        valueFrom:
          secretKeyRef:
            name: genai-credentials
            key: logosApiKey
      - name: INCIDENT_SERVICE_URL
        value: http://incident-service:8081

  swagger-ui:
    enabled: true
    port: 8080
    image:
      override: swaggerapi/swagger-ui:v5.32.6
    openapiConfigMap: true
    env:
      - name: SWAGGER_JSON
        value: /openapi.yaml
      - name: BASE_URL
        value: /swagger

  ollama:
    enabled: true
    port: 11434
    # Model pull can exceed the default 10m Deployment progress deadline on first deploy.
    progressDeadlineSeconds: 1800
    image:
      override: "ollama/ollama:0.9.0"
    command: ["ollama", "serve"]
    # Pull model into the PVC before ollama serve starts (same idea as compose ollama-init).
    modelInit: true
    ollamaProbes: true
    env:
      - name: OLLAMA_MODEL
        value: *ollamaModel
    resources:
      requests:
        memory: 3Gi
      limits:
        memory: 4Gi
    persistence:
      size: 10Gi
      mountPath: /root/.ollama
