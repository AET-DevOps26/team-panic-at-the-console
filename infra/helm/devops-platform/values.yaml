global:
  image:
    registry: ghcr.io/aet-devops26/team-panic-at-the-console
    tag: latest
    pullPolicy: Always
  namespace: default
  # Shared Ollama model tag: genai-service, init pull, and readiness probe.
  ollamaModel: &ollamaModel qwen2.5:3b
  # Fallback resources for any service without its own `resources` block.
  # The stud cluster project quota rejects pods that omit cpu/memory limits and
  # caps the namespace at 4 cpu / 6Gi of limits, so keep the totals under that.
  defaultResources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
  env:
    - name: NATS_URL
      value: nats://nats:4222
    # Let the JVM use ~65% of the (tight) container memory as heap instead of the
    # ~25% default. Inherited by the Java services; inert for the Python genai-service.
    - name: JAVA_TOOL_OPTIONS
      value: "-XX:MaxRAMPercentage=65"

# Override these in SOPS values for non-dev deploys.
secrets:
  postgresPassword: ""
  # TUM Logos API key (lg-...). Empty => genai-service falls back to Ollama.
  logosApiKey: ""
  # Grafana admin password. Empty => falls back to monitoring.grafana.adminPassword (dev default).
  grafanaPassword: ""
  # Session JWT signing secret (min 32 chars). Empty => falls back to auth.jwtSecret (dev default).
  jwtSecret: ""
  # Registration invitation code. Empty => falls back to auth.inviteCode.
  inviteCode: ""

auth:
  # Dev default for the session JWT secret shared by gateway and user-service
  # (ADR 0007). Override via secrets.jwtSecret in SOPS values for real deploys.
  jwtSecret: local-dev-only-jwt-secret-0123456789abcdef
  # Dev default for the registration invitation code. Blank keeps
  # self-registration open; public instances set secrets.inviteCode.
  inviteCode: ""

nats:
  image: nats:2.10-alpine
  port: 4222
  monitoringPort: 8222
  persistence:
    size: 1Gi
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

postgres:
  image: postgres:16-alpine
  port: 5432
  user: devops
  password: devops
  database: postgres
  persistence:
    size: 5Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

ingress:
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: team-panic-at-the-console-devops26.stud.k8s.aet.cit.tum.de
  secretName: devops-platform-tls
  paths:
    frontend: /
    api: /api
    swagger: /swagger
    grafana: /grafana
    prometheus: /prometheus

# Observability mirrors team-password123's namespace-local setup: plain
# Prometheus + Grafana resources, no kube-prometheus-stack, no CRDs, no
# cluster-scoped RBAC. Grafana is exposed under /grafana.
monitoring:
  enabled: true
  operatorCrds:
    # Optional compatibility mode for clusters that already run prometheus-operator.
    # Keep false for Azure or any namespace-scoped deploy user.
    enabled: false
  prometheus:
    image: prom/prometheus:v2.55.1
    scrapeInterval: 15s
    retention: 7d
    persistence:
      # Off by default: the TSDB is an emptyDir, so history resets on each pod
      # restart and `retention` above is only an upper bound. Enabling this also
      # switches the rollout to Recreate (an RWO volume cannot mount on two pods).
      enabled: false
      storageClass: ""
      size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi
  grafana:
    image: grafana/grafana:11.4.0
    adminUser: admin
    # Override in encrypted deploy values. Kept as a dev default so chart
    # rendering stays local-friendly.
    adminPassword: admin
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

services:
  frontend:
    enabled: true
    port: 3000
    image:
      repository: frontend
    # Static nginx; a fraction of the default is plenty and saves quota budget.
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
    # Sidebar footer link to the namespace-local Grafana. Prometheus is also
    # exposed under /prometheus for demonstration.
    env:
      - name: GRAFANA_URL
        value: /grafana

  gateway:
    enabled: true
    inheritGlobalEnv: true
    port: 8080
    metricsPort: 8090
    probes: true
    healthPath: /api/v1/health
    image:
      repository: gateway
    env:
      - name: GATEWAY_INCIDENT_SERVICE_URL
        value: "http://incident-service:8081"
      - name: GATEWAY_EVENT_SERVICE_URL
        value: "http://event-service:8082"
      - name: GATEWAY_USER_SERVICE_URL
        value: "http://user-service:8084"
      - name: GATEWAY_NOTIFICATION_SERVICE_URL
        value: "http://notification-service:8085"
      # Session JWT secret shared with user-service; resolved from the
      # auth-credentials secret in deployment.yaml.
      - name: AUTH_JWT_SECRET

  incident-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8081
    probes: true
    healthPath: /health
    image:
      repository: incident-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/incidents"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  event-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8082
    image:
      repository: event-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/events"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  rule-engine:
    enabled: true
    inheritGlobalEnv: true
    port: 8083
    image:
      repository: rule-engine
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/rules"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  user-service:
    enabled: true
    port: 8084
    probes: true
    healthPath: /health
    image:
      repository: user-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/users"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD
      # Session JWT secret shared with the gateway; resolved from the
      # auth-credentials secret in deployment.yaml.
      - name: AUTH_JWT_SECRET
      # Registration invitation code from the same secret.
      - name: AUTH_INVITE_CODE
      # user-service does not inherit global.env, so set the JVM heap sizing here too.
      - name: JAVA_TOOL_OPTIONS
        value: "-XX:MaxRAMPercentage=65"

  notification-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8085
    probes: true
    healthPath: /health
    image:
      repository: notification-service
    env:
      - name: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://postgres:5432/notifications"
      - name: SPRING_DATASOURCE_USERNAME
        value: devops
      - name: SPRING_DATASOURCE_PASSWORD

  webhook-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8086
    image:
      repository: webhook-service

  genai-service:
    enabled: true
    inheritGlobalEnv: true
    port: 8087
    probes: true
    healthPath: /health
    probeInitialDelaySeconds: 15
    probeReadinessInitialDelaySeconds: 5
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: /metrics
      prometheus.io/port: "8087"
    image:
      repository: genai-service
    env:
      # In-cluster Ollama is disabled under the 6Gi project quota, so Logos is the
      # only provider here and the Ollama fallback is off (nothing to fall back to).
      - name: LLM_PROVIDER
        value: logos
      - name: LLM_FALLBACK_ENABLED
        value: "false"
      - name: OLLAMA_URL
        value: http://ollama:11434
      - name: OLLAMA_MODEL
        value: *ollamaModel
      - name: LOGOS_URL
        value: https://logos.aet.cit.tum.de:8080
      - name: LOGOS_MODEL
        value: openai/gpt-oss-120b
      - name: LOGOS_API_KEY
        valueFrom:
          secretKeyRef:
            name: genai-credentials
            key: logosApiKey
      - name: INCIDENT_SERVICE_URL
        value: http://incident-service:8081

  swagger-ui:
    enabled: true
    port: 8080
    image:
      override: swaggerapi/swagger-ui:v5.32.6
    openapiConfigMap: true
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
    env:
      - name: SWAGGER_JSON
        value: /openapi.yaml
      - name: BASE_URL
        value: /swagger

  ollama:
    # Disabled on the stud cluster: the project quota (6Gi) cannot fit a 3B model
    # (~4Gi) alongside the rest of the stack. genai-service uses TUM Logos instead.
    # Re-enable only where the namespace has enough quota headroom.
    enabled: false
    port: 11434
    # Model pull can exceed the default 10m Deployment progress deadline on first deploy.
    progressDeadlineSeconds: 1800
    image:
      override: "ollama/ollama:0.9.0"
    command: ["ollama", "serve"]
    # Pull model into the PVC before ollama serve starts (same idea as compose ollama-init).
    modelInit: true
    ollamaProbes: true
    env:
      - name: OLLAMA_MODEL
        value: *ollamaModel
    resources:
      requests:
        cpu: 250m
        memory: 3Gi
      limits:
        cpu: "2"
        memory: 4Gi
    persistence:
      size: 10Gi
      mountPath: /root/.ollama
