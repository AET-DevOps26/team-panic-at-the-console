# Local OrbStack overrides (no public ingress / cert-manager).
# Usage:
#   helm upgrade --install ... -f values.yaml -f values.orbstack.yaml -f secrets/values.prod.dec.yaml

ingress:
  annotations: {}
  host: localhost

kube-prometheus-stack:
  grafana:
    ingress:
      enabled: false
  alertmanager:
    enabled: false
