# Local Kubernetes (OrbStack): Grafana via port-forward on :3030.
# Usage (after helm-deploy or manual upgrade):
#   pixi run -e deploy helm upgrade ... --values infra/helm/values.local-k8s.yaml
#   pixi run grafana-forward   # separate terminal
#   open http://localhost:3030/
kube-prometheus-stack:
  grafana:
    ingress:
      enabled: false
    grafana.ini:
      server:
        root_url: http://localhost:3030/
        serve_from_sub_path: false
  alertmanager:
    enabled: false
