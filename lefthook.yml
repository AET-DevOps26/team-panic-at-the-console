# yaml-language-server: $schema=https://raw.githubusercontent.com/evilmartians/lefthook/refs/heads/master/schema.json
output: [summary]
templates:
  run: run --as-is --quiet --no-progress
no_auto_install: true

pre-commit:
  fail_on_changes: always
  exclude:
    - assets/**/*
  jobs:
    - group:
        parallel: true
        jobs:
          - name: ruff-check
            glob: "**/*.{py,pyi}"
            run: pixi {run} ruff check --fix --exit-non-zero-on-fix --force-exclude

          - name: ruff-format
            glob: "**/*.{py,pyi}"
            run: pixi {run} ruff format --force-exclude

          - name: prettier
            glob: "**/*.{md,yml,yaml,json}"
            run: pixi {run} prettier --write --no-error-on-unmatched-pattern --list-different --ignore-unknown {staged_files}

          - name: taplo
            glob: "**/*.toml"
            run: pixi {run} taplo format {staged_files}

          - name: check-merge-conflict
            glob: "**/*"
            file_types: text
            run: pixi {run} check-merge-conflict --assume-in-merge {staged_files}

          - name: typos
            glob: "**/*"
            file_types: text
            run: pixi {run} typos --force-exclude {staged_files}

          - name: openapi-lint
            glob: "api/openapi.yaml"
            run: pixi {run} openapi-lint

    # Run after parallel linters; both modify file bytes and must not race.
    - group:
        parallel: false
        jobs:
          - name: trailing-whitespace-fixer
            glob: "**/*"
            file_types: text
            run: pixi {run} trailing-whitespace-fixer {staged_files}

          - name: end-of-file-fixer
            glob: "**/*"
            file_types: text
            run: pixi {run} end-of-file-fixer {staged_files}

post-checkout:
  jobs:
    - name: regen-stubs
      run: >-
        if [ "{3}" = "1" ] && git diff --name-only {1} {2} -- api/openapi.yaml | grep -q .; then
        pixi {run} gen-all; fi

post-merge:
  jobs:
    - name: regen-stubs
      run: >-
        if git diff --name-only ORIG_HEAD HEAD -- api/openapi.yaml | grep -q .; then
        pixi {run} gen-all; fi
