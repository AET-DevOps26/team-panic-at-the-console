spring.application.name=gateway
server.servlet.context-path=/api/v1
server.port=8080

gateway.incident-service-url=http://localhost:8081
gateway.event-service-url=http://localhost:8082
gateway.user-service-url=http://localhost:8084
gateway.notification-service-url=http://localhost:8085

# Session JWT validation (ADR 0007). Must match user-service's auth.jwt.secret;
# this dev-only default is overridden via AUTH_JWT_SECRET in compose/Helm.
auth.jwt.secret=local-dev-only-jwt-secret-0123456789abcdef

# Observability — dedicated port avoids the /api/v1 context-path prefix
management.server.port=8090
management.endpoints.web.exposure.include=prometheus,health
management.endpoint.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
