spring.application.name=gateway
server.servlet.context-path=/api/v1
server.port=8080

gateway.incident-service-url=http://localhost:8081
gateway.user-service-url=http://localhost:8084
gateway.notification-service-url=http://localhost:8085

# Observability — dedicated port avoids the /api/v1 context-path prefix
management.server.port=8090
management.endpoints.web.exposure.include=prometheus,health
management.endpoint.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
