spring.application.name=user-service
server.port=8084

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/users
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Session JWT (ADR 0007). The secret must match the gateway's auth.jwt.secret;
# this dev-only default is overridden via AUTH_JWT_SECRET in compose/Helm.
auth.jwt.secret=local-dev-only-jwt-secret-0123456789abcdef
auth.session-ttl=24h
# Registration invitation code. Blank keeps self-registration open (dev);
# public instances set AUTH_INVITE_CODE so only invited people can sign up.
auth.invite-code=

# Observability
management.endpoints.web.exposure.include=prometheus,health
management.endpoint.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
