spring.application.name=webhook-service
spring.http.converters.preferred-json-mapper=jackson2
server.port=8086

# Database Configuration (defaults match the compose Postgres; overridden via env)
spring.datasource.url=jdbc:postgresql://localhost:5432/webhooks
spring.datasource.username=devops
spring.datasource.password=devops
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# NATS Configuration
nats.url=nats://localhost:4222

# Webhook ingestion
# Per-source HMAC secrets: webhook.secrets.<source>=<secret>
# (e.g. WEBHOOK_SECRETS_GITHUB=...). A source with a secret must send a valid
# X-Hub-Signature-256 header. With require-signature=true, sources without a
# configured secret are rejected outright.
webhook.require-signature=false
# Events whose NATS publish failed are retried until this attempt cap.
webhook.publish.retry-delay-ms=30000
webhook.publish.min-age-ms=10000
webhook.publish.max-attempts=10

# Observability
management.endpoints.web.exposure.include=prometheus,health
management.metrics.distribution.percentiles-histogram.http.server.requests=true
