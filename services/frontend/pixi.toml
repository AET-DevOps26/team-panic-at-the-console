[workspace]
name = "frontend"
channels = ["conda-forge"]
exclude-newer = "7d"
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64", "win-64"]

[dependencies]
nodejs = ">=22,<23"

[tasks]
install = "npm install"
install-ci = "npm ci"
dev = "npm run dev"
dev-mock-api = "npm run dev:mock-api"
build = "npm run build"
test = "npm test"
prod = "npm run build && npm run preview"
