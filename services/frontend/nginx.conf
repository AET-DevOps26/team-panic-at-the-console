server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Serve static assets with long cache (Vite adds content hashes)
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy /api to the gateway service.
    # Using a variable defers DNS resolution to request time so the container
    # starts cleanly even when the gateway is not yet reachable (e.g. standalone
    # docker run). Unresolvable upstream → 502 on the individual request only.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream http://gateway:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
