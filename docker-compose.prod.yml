services:
  reverse-proxy:
    image: traefik:v3.3
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@tum.de}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt

  gateway:
    image: ghcr.io/manuellerchner/devops-project-2026/gateway:${IMAGE_TAG:-main}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`${APP_HOSTNAME}`)"
      - "traefik.http.services.gateway.loadbalancer.server.port=8080"
      - "traefik.http.routers.gateway.entrypoints=websecure"
      - "traefik.http.routers.gateway.tls.certresolver=letsencrypt"

  user-service:
    image: ghcr.io/manuellerchner/devops-project-2026/user-service:${IMAGE_TAG:-main}
    restart: unless-stopped

  content-service:
    image: ghcr.io/manuellerchner/devops-project-2026/content-service:${IMAGE_TAG:-main}
    restart: unless-stopped

  genai-service:
    image: ghcr.io/manuellerchner/devops-project-2026/genai-service:${IMAGE_TAG:-main}
    restart: unless-stopped
