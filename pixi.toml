[workspace]
name = "devops-project-2026"
description = "Tooling workspace for hooks and CI quality checks"
channels = ["conda-forge"]
exclude-newer = "14d"
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.12,<3.14"
nodejs = ">=22,<23"

[feature.lint.dependencies]
lefthook = "*"
ruff = "*"
prettier = "*"
taplo = "*"
pre-commit-hooks = "*"
typos = "*"
openapi-python-client = ">=0.28.3"
typer = ">=0.16,<0.25"
vacuum = "*"

[feature.lint.tasks]
pre-commit-install = "lefthook install"
lint = "lefthook run pre-commit --all-files"
openapi-lint = "test ! -f api/openapi.yaml || vacuum lint api/openapi.yaml"
openapi-codegen-validate = "bash api/scripts/validate-codegen.sh"

[tasks]
# Calls the service Pixi project (pixi-build); runnable without `-e dev`.
test-genai = "pixi run --manifest-path services/genai-service/pixi.toml test"

[feature.dev.tasks]
compose-up = "docker compose --project-directory . --env-file .env.example -f infra/compose/docker-compose.yml up --build"
compose-down = "docker compose --project-directory . -f infra/compose/docker-compose.yml down --remove-orphans"
compose-validate = "docker compose --project-directory . --env-file .env.example -f infra/compose/docker-compose.yml config > /dev/null"
compose-smoke-genai-metrics = "bash infra/compose/scripts/smoke-genai-metrics.sh"
grafana-forward = "kubectl port-forward -n production svc/devops-platform-grafana 3030:80"
gen-all = "bash api/scripts/gen-all.sh"
mock-api = "npx --yes @stoplight/prism-cli@4.10.5 mock --cors api/openapi.yaml"

[feature.deploy.dependencies]
kubernetes-helm = "*"
kubernetes-client = "*"
go-sops = "*"
age = "*"
k9s = "*"

[feature.deploy.tasks]
helm-deploy = "bash infra/helm/scripts/deploy.sh"
helm-uninstall = "bash infra/helm/scripts/uninstall.sh"

[environments]
default = ["lint"]
dev = ["lint", "dev"]
deploy = ["deploy"]
