[workspace]
name = "devops-project-2026"
description = "Tooling workspace for hooks and CI quality checks"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.12,<3.14"
nodejs = ">=22,<23"

[feature.lint.dependencies]
lefthook = "*"
ruff = "*"
prettier = "*"
taplo = "*"
pre-commit-hooks = "*"
typos = "*"

[feature.lint.tasks]
pre-commit-install = "lefthook install"
lint = "lefthook run pre-commit --all-files"

[feature.dev.tasks]
compose-up = "docker compose --env-file .env.example up --build"
compose-down = "docker compose down --remove-orphans"
compose-up-prod = "docker compose --env-file .env.example -f docker-compose.prod.yml up -d"
compose-validate = "docker compose --env-file .env.example -f docker-compose.yml config > /dev/null && docker compose --env-file .env.example -f docker-compose.prod.yml config > /dev/null"
openapi-lint = "bash -lc 'if [ -f api/openapi.yaml ]; then npx --yes @redocly/cli@1.19.0 lint api/openapi.yaml; else echo \"No api/openapi.yaml found, skipping OpenAPI lint\"; fi'"

[feature.deploy.dependencies]
kubernetes-helm = "*"
kubernetes-client = "*"
go-sops = "*"
age = "*"
k9s = "*"

[feature.deploy.tasks]
deploy-tools-version = "helm version --short && kubectl version --client --short && sops --version"

[environments]
default = ["lint"]
dev = ["lint", "dev"]
deploy = ["deploy"]
